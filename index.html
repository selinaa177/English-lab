<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Lab</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English Lab">
<meta name="theme-color" content="#F7F4EF">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');
:root{
  --bg:#F7F4EF;--bg2:#FFFFFF;--bg3:#EFECE6;--bg4:#E8E4DC;
  --border:#E2DDD5;--border2:#CFC9BF;
  --text:#28241E;--text2:#6B6560;--text3:#9E9890;
  --accent:#C8520A;--accent2:rgba(200,82,10,.1);--accent3:rgba(200,82,10,.06);
  --green:#2E7D52;--green2:rgba(46,125,82,.1);
  --blue:#2D5FA0;--blue2:rgba(45,95,160,.1);
  --amber:#B07820;--amber2:rgba(176,120,32,.1);
  --red:#B83030;--red2:rgba(184,48,48,.1);
  --serif:'Lora',Georgia,serif;
  --mono:'DM Mono',monospace;
  --sans:'Noto Sans SC',-apple-system,sans-serif;
  --r:12px;--shadow:0 1px 4px rgba(0,0,0,.06);--shadow2:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto}

/* ── Header ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 18px 12px;flex-shrink:0}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.hdr-brand{font-family:var(--serif);font-size:19px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
.hdr-brand span{color:var(--accent)}
.hdr-level{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.hdr-right{text-align:right}
.hdr-streak{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--accent);line-height:1}
.hdr-slabel{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.hdr-stats{display:flex;gap:14px}
.hdr-stat{font-family:var(--mono);font-size:10px;color:var(--text3)}
.hdr-stat b{color:var(--text2);font-weight:500}
.token-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:2px 8px;margin-left:8px}
.token-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}

/* ── Nav ── */
.nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:52px;padding:9px 4px;font-size:11px;font-family:var(--sans);color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding:16px 18px 80px;-webkit-overflow-scrolling:touch}
.main::-webkit-scrollbar{width:2px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.view{display:none}.view.on{display:block}

/* ── UI Kit ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.sec-title{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn:active{opacity:.8}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:none;color:var(--accent);border:1px solid var(--border)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}
.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.chip{display:inline-flex;align-items:center;font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.chip-acc{background:var(--accent2);color:var(--accent)}
.chip-grn{background:var(--green2);color:var(--green)}
.chip-blu{background:var(--blue2);color:var(--blue)}
.chip-amb{background:var(--amber2);color:var(--amber)}
.chip-red{background:var(--red2);color:var(--red)}
.input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--text3)}
.textarea{width:100%;min-height:120px;resize:none;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-family:var(--serif);font-size:15px;color:var(--text);line-height:1.7;outline:none;transition:border-color .15s}
.textarea:focus{border-color:var(--accent)}
.textarea::placeholder{color:var(--text3);font-family:var(--sans);font-size:13px}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
.spinner-dark{border-color:var(--border);border-top-color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 0;font-size:13px;color:var(--text3);line-height:2}
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.fchip{font-size:11px;font-family:var(--sans);padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s}
.fchip.on{border-color:var(--accent);color:var(--accent);background:var(--accent3)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease}

/* ── Setup / Test ── */
.setup-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:20px}
.setup-icon{font-size:48px;margin-bottom:16px}
.setup-title{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--text);margin-bottom:8px}
.setup-desc{font-size:13px;color:var(--text2);line-height:1.7;max-width:300px;margin-bottom:24px}
.key-input-wrap{width:100%;max-width:340px;margin-bottom:12px}
.key-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:12px;font-family:var(--mono);color:var(--text);outline:none;transition:border-color .15s}
.key-input:focus{border-color:var(--accent)}
.key-input::placeholder{color:var(--text3)}

/* ── Dashboard ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;box-shadow:var(--shadow)}
.dash-label{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.dash-val{font-size:21px;font-family:var(--mono);font-weight:500;color:var(--text)}
.dash-val .u{font-size:11px;color:var(--text3);font-weight:400}
.today-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.today-item:last-child{border-bottom:none}
.today-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.today-label{font-size:13px;font-weight:500;color:var(--text)}
.today-hint{font-size:11px;color:var(--text3);margin-top:1px}
.today-cta{font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--accent2);border:none;padding:5px 12px;border-radius:20px;cursor:pointer;flex-shrink:0}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease}

/* ── Vocab ── */
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.vcard-row{padding:12px 15px;display:flex;align-items:center;gap:10px;cursor:pointer}
.vcard-word{font-family:var(--serif);font-size:16px;font-weight:500;color:var(--text);flex:1}
.vcard-star{font-size:15px;color:var(--border2);cursor:pointer;transition:color .15s;padding:2px}
.vcard-star.on{color:var(--amber)}
.vcard-body{display:none;padding:0 15px 13px;border-top:1px solid var(--border)}
.vcard-body.on{display:block}
.vcard-ph{font-family:var(--mono);font-size:11px;color:var(--text3);margin:8px 0 5px}
.vcard-def{font-size:13px;color:var(--text2);margin-bottom:6px;line-height:1.6}
.pos-tag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent);background:var(--accent2);padding:1px 5px;border-radius:3px;margin-right:4px;text-transform:lowercase}
.vcard-ex{font-family:var(--serif);font-size:13px;color:var(--text2);font-style:italic;padding:8px 11px;background:var(--bg3);border-radius:6px;line-height:1.6}
.vcard-exzh{font-style:normal;font-family:var(--sans);font-size:11px;color:var(--text3);margin-top:4px;display:block}

/* Flashcard — 百词斩风格 */
.fc-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0}
.fc-stats-bar{display:flex;gap:8px;margin-bottom:12px;width:100%;max-width:360px}
.fc-stat{flex:1;text-align:center;padding:7px 4px;border-radius:8px;font-size:11px;font-family:var(--mono)}
.fc-stat .n{font-size:18px;font-weight:600;display:block;line-height:1.2}
.fc-stat.hard{background:var(--red2);color:var(--red)}
.fc-stat.ok{background:var(--amber2);color:var(--amber)}
.fc-stat.easy{background:var(--green2);color:var(--green)}
.fc-stat.left{background:var(--bg3);color:var(--text3)}
.fc-prog-wrap{width:100%;max-width:360px;margin-bottom:14px}
.fc-prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.fc-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.fc-prog-label{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px;text-align:right}
.fc{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow2);overflow:hidden;cursor:pointer;transition:transform .15s;user-select:none}
.fc:active{transform:scale(.99)}
.fc-front{padding:36px 24px 28px;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fc-cat-tag{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;padding:2px 10px;border-radius:10px;margin-bottom:16px;display:inline-block}
.fc-word{font-family:var(--serif);font-size:34px;font-weight:600;color:var(--text);line-height:1.2}
.fc-ph-row{display:flex;align-items:center;gap:10px;margin-top:10px;justify-content:center}
.fc-ph{font-family:var(--mono);font-size:13px;color:var(--text3)}
.fc-speak{background:none;border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s}
.fc-speak:active{background:var(--bg3)}
.fc-hint{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:16px;padding:6px 14px;background:var(--bg3);border-radius:20px}
.fc-back{border-top:2px solid var(--border);padding:20px 24px 24px;background:var(--bg)}
.fc-pos{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.fc-def-big{font-size:17px;font-weight:600;color:var(--text);margin-bottom:12px;line-height:1.4}
.fc-ex-wrap{background:var(--bg2);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.fc-ex-en{font-family:var(--serif);font-size:14px;color:var(--text);font-style:italic;line-height:1.6;margin-bottom:4px}
.fc-ex-zh{font-size:12px;color:var(--text3);line-height:1.5}
.fc-actions{display:flex;gap:8px;margin-top:14px;width:100%;max-width:360px}
.fc-btn{flex:1;padding:14px 6px;border:none;border-radius:12px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.fc-btn:active{transform:scale(.96)}
.fc-btn .fc-btn-icon{font-size:18px}
.fc-btn.hard{background:var(--red2);color:var(--red)}
.fc-btn.ok{background:var(--amber2);color:var(--amber)}
.fc-btn.easy{background:var(--green2);color:var(--green)}

/* ── Reading ── */
.art-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.art-cat{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:5px}
.art-title{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:5px}
.art-desc{font-size:12px;color:var(--text3);line-height:1.5}
.art-meta{display:flex;gap:10px;margin-top:8px}
.art-meta span{font-family:var(--mono);font-size:10px;color:var(--text3)}
.art-generating{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

.reader-back{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:4px 0;margin-bottom:14px;display:inline-flex;align-items:center;gap:4px}
.reader-title{font-family:var(--serif);font-size:21px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:14px}
.reader-meta{display:flex;gap:10px;margin-bottom:16px}
.reader-body{font-family:var(--serif);font-size:16px;color:var(--text);line-height:1.85}
.reader-body p{margin-bottom:14px}
.hl{background:var(--accent2);padding:1px 2px;border-radius:3px;cursor:pointer;border-bottom:1px solid rgba(200,82,10,.3)}
.reader-q{margin-top:20px}
.reader-q-title{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:12px;padding-top:16px;border-top:1px solid var(--border)}
.q-item{margin-bottom:16px}
.q-text{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5}
.q-opts{display:flex;flex-direction:column;gap:6px}
.q-opt{padding:10px 13px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;background:var(--bg2);transition:all .15s;text-align:left}
.q-opt.selected{border-color:var(--accent);background:var(--accent2);color:var(--accent);font-weight:500}
.q-opt.correct{border-color:var(--green);background:var(--green2);color:var(--green)}
.q-opt.wrong{border-color:var(--red);background:var(--red2);color:var(--red)}

/* Word popup */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:99;display:none}
.overlay.on{display:block}
.popup{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--bg2);border-radius:18px 18px 0 0;border-top:1px solid var(--border);padding:20px 20px 32px;box-shadow:0 -4px 24px rgba(0,0,0,.12);transition:transform .28s cubic-bezier(.32,.72,0,1);z-index:100}
.popup.on{transform:translateX(-50%) translateY(0)}
.popup-close{position:absolute;right:16px;top:16px;background:var(--bg3);border:none;width:28px;height:28px;border-radius:50%;font-size:14px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.popup-word{font-family:var(--serif);font-size:22px;font-weight:600}
.popup-ph{font-family:var(--mono);font-size:12px;color:var(--text3);margin-top:3px}
.popup-def{font-size:14px;color:var(--text2);margin-top:10px;line-height:1.6}

/* ── Listening ── */
.listen-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;box-shadow:var(--shadow)}
.listen-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.listen-src{font-family:var(--mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.listen-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.listen-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--blue);text-decoration:none;font-weight:500}
.listen-exercises{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.shadowing-text{font-family:var(--serif);font-size:15px;color:var(--text);line-height:1.8;padding:14px;background:var(--bg3);border-radius:8px;margin-bottom:12px}
.yt-wrap{position:relative;width:100%;padding-bottom:56.25%;margin:10px 0;border-radius:var(--r);overflow:hidden;background:#000}
.yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}

/* ── Writing ── */
.prompt-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.prompt-cat{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.prompt-text{font-family:var(--serif);font-size:15px;color:var(--text);line-height:1.5;margin-bottom:6px}
.prompt-hint{font-size:11px;color:var(--text3);line-height:1.5}
.fb-block{margin-bottom:14px}
.fb-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:5px}
.fb-text{font-size:13px;color:var(--text2);line-height:1.6}
.fb-score{font-size:32px;font-family:var(--mono);font-weight:500;color:var(--accent)}
.improved-text{font-family:var(--serif);font-size:14px;color:var(--text);line-height:1.8}

/* ── Log ── */
.log-entry{padding:10px 0;border-bottom:1px solid var(--border)}
.log-entry:last-child{border-bottom:none}
.log-meta{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:3px;display:flex;gap:8px;flex-wrap:wrap}
.log-body{font-size:13px;color:var(--text2);line-height:1.5}

/* ── Test ── */
.test-q{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.test-qnum{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.test-qtext{font-size:14px;color:var(--text);margin-bottom:12px;line-height:1.6;font-family:var(--serif)}
.test-opts{display:flex;flex-direction:column;gap:7px}
.test-opt{padding:10px 13px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;background:var(--bg2);transition:all .15s;text-align:left}
.test-opt.selected{border-color:var(--accent);background:var(--accent2);color:var(--accent)}
.test-opt.correct{border-color:var(--green);background:var(--green2);color:var(--green)}
.test-opt.wrong{border-color:var(--red);background:var(--red2);color:var(--red)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-brand">English<span>.</span>Lab</div>
        <div class="hdr-level" id="hdrLevel">B1+ · 商务英语</div>
      </div>
      <div class="hdr-right">
        <div class="hdr-streak" id="hdrStreak">0</div>
        <div class="hdr-slabel">day streak</div>
      </div>
    </div>
    <div class="hdr-stats">
      <div class="hdr-stat">词汇 <b id="hVocab">0</b></div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const DS_URL = 'https://api.openai.com/v1/chat/completions'; // we'll override base
const MODEL = 'deepseek-chat'; // deepseek-v4-flash equivalent via their openai-compatible endpoint
const DS_BASE = 'https://api.deepseek.com/v1/chat/completions';

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S = {
  key: '',
  level: 'B1+',
  streak: 0,
  lastActive: null,
  totalTokens: 0,
  vocab: [],         // {word,phonetic,def,cat,example,exZh,starred,added,reviewCount,lastReview,mastered}
  logs: [],          // {date,type,mins,text,ts}
  writingCount: 0,
  dailyVocab: null,  // {date, words:[]}
  dailyReading: null,// {date, article:{}}
  dailyListening: null, // {date, content:{}}
  dailyWriting: null,// {date, prompts:[]}
  testHistory: [],   // [{date,score,total}]
  dayCount: 0,       // days since start
  startDate: null,
};

function load() {
  try {
    const d = localStorage.getItem('elab_v2');
    if (d) Object.assign(S, JSON.parse(d));
  } catch(e) {}
}
function save() {
  try { localStorage.setItem('elab_v2', JSON.stringify(S)); } catch(e) {}
}

// ══════════════════════════════════════════
// API
// ══════════════════════════════════════════
async function ds(systemPrompt, userPrompt, maxTokens=800) {
  const resp = await fetch(DS_BASE, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${S.key}`
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      max_tokens: maxTokens,
      temperature: 0.3,
      messages: [
        {role:'system', content: systemPrompt},
        {role:'user', content: userPrompt}
      ]
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }
  const data = await resp.json();
  // track tokens
  if (data.usage) {
    S.totalTokens += (data.usage.total_tokens || 0);
    save();
    document.getElementById('tokenCount').textContent = Math.round(S.totalTokens/1000);
  }
  return data.choices[0].message.content;
}

async function dsJSON(system, user, maxTokens=800) {
  const raw = await ds(system, user, maxTokens);
  const clean = raw.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

// ══════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════
function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k.startsWith('sk-')) { alert('请输入有效的 DeepSeek API Key'); return; }
  S.key = k;
  if (!S.startDate) {
    S.startDate = new Date().toDateString();
    S.dayCount = 1;
  }
  save();
  showMainApp();
}

function showMainApp() {
  document.getElementById('view-setup').classList.remove('on');
  updateStreak();
  renderAll();
  gotoTab('dash');
}

// ══════════════════════════════════════════
// STREAK
// ══════════════════════════════════════════
function updateStreak() {
  const today = new Date().toDateString();
  if (S.lastActive === today) return;
  const yesterday = new Date(Date.now()-86400000).toDateString();
  if (S.lastActive === yesterday) S.streak++;
  else if (S.lastActive !== today) S.streak = S.logs.length > 0 ? Math.max(S.streak,1) : 1;
  S.lastActive = today;
  save();
}
function markActive() {
  const today = new Date().toDateString();
  if (S.lastActive !== today) { S.lastActive = today; S.streak = Math.max(S.streak,1); save(); }
}

// ══════════════════════════════════════════
// TODAY UTILS
// ══════════════════════════════════════════
const today = () => new Date().toDateString();
const isTodayData = (d) => d && d.date === today();

// ══════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════
function renderAll() {
  renderHeader();
  renderDash();
  renderVocab('list');
  renderWritePrompts();
  renderListenContent();
  renderLogList();
}

function renderHeader() {
  document.getElementById('hdrStreak').textContent = S.streak;
  document.getElementById('hdrLevel').textContent = `${S.level} · 商务英语`;
  document.getElementById('hVocab').textContent = S.vocab.length;
  document.getElementById('hMins').textContent = S.logs.reduce((a,l)=>a+(parseInt(l.mins)||0),0);
  document.getElementById('hWrite').textContent = S.writingCount;
  document.getElementById('tokenCount').textContent = Math.round(S.totalTokens/1000);
}

// ══════════════════════════════════════════
// DASH
// ══════════════════════════════════════════
function renderDash() {
  const due = S.vocab.filter(v=>!v.lastReview||Date.now()-v.lastReview>86400000).length;
  document.getElementById('dVocab').innerHTML = `${S.vocab.length} <span class="u">词</span>`;
  document.getElementById('dReview').innerHTML = `${due} <span class="u">词</span>`;
  document.getElementById('dMins').innerHTML = `${S.logs.reduce((a,l)=>a+(parseInt(l.mins)||0),0)} <span class="u">min</span>`;

  // next biweekly test
  const daysIn = S.dayCount || 1;
  const nextTest = 14 - ((daysIn-1) % 14);
  document.getElementById('dNextTest').textContent = nextTest === 14 ? '今天!' : `${nextTest}天后`;

  const tasks = [
    {ico:'📝', bg:'var(--accent2)', label:`今日新词 (${isTodayData(S.dailyVocab)?S.dailyVocab.words.length:25}词)`, hint:'25个新词 · AI生成 · 含音标例句', tab:'vocab', mode:'daily'},
    {ico:'📖', bg:'var(--blue2)', label:'阅读练习', hint:'商务文章 · 生词高亮 · 理解问答', tab:'read'},
    {ico:'🎧', bg:'rgba(46,125,82,.08)', label:'听力任务', hint:'BBC/播客资源 + AI配套练习', tab:'listen'},
    {ico:'✍️', bg:'var(--amber2)', label: isWritingDay() ? '写作练习 · 今天要写！' : `写作练习 · ${daysUntilNextWriting()}天后`, hint:'周三 + 周六 · 每次1篇 · AI批改', tab:'write'},
  ];

  document.getElementById('todayList').innerHTML = tasks.map((t,i)=>`
    <div class="today-item fade-up" style="animation-delay:${i*.05}s">
      <div class="today-ico" style="background:${t.bg}">${t.ico}</div>
      <div style="flex:1">
        <div class="today-label">${t.label}</div>
        <div class="today-hint">${t.hint}</div>
      </div>
      <button class="today-cta" onclick="gotoTabWithMode('${t.tab}','${t.mode||''}')">GO →</button>
    </div>
  `).join('');
}

function gotoTabWithMode(tab, mode) {
  gotoTab(tab);
  if (tab==='vocab' && mode) { setTimeout(()=>setVmode(mode),50); }
}

// ══════════════════════════════════════════
// VOCAB
// ══════════════════════════════════════════
let vmode = 'list';
let flashIdx=0, flashRevealed=false, flashQueue=[];

function setVmode(m) {
  vmode = m;
  document.querySelectorAll('#view-vocab .fchip').forEach((b,i)=>{
    b.classList.toggle('on', ['list','flash','daily','add'][i]===m);
  });
  ['list','flash','daily','add'].forEach(id=>{
    document.getElementById('v'+id).style.display = id===m?'block':'none';
  });
  if (m==='list') renderVocab('list');
  if (m==='flash') initFlash();
  if (m==='daily') renderDailyVocab();
}

function renderDefsHTML(v) {
  if (v.defs && v.defs.length) {
    return v.defs.map(d=>`<div class="vcard-def"><span class="pos-tag">${d.pos}</span>${d.def}</div>`).join('');
  }
  return `<div class="vcard-def">${v.def||''}</div>`;
}

function renderVocab() {
  const el = document.getElementById('vlist');
  if (!S.vocab.length) { el.innerHTML = '<div class="empty">词汇本还是空的<br>去「今日新词」开始积累 ✨</div>'; return; }
  const catMap = {biz:'商务',trade:'外贸',data:'数据',general:'通用',ielts:'雅思'};
  const ratingBadge = {easy:'<span style="font-size:10px;color:var(--green)">✅ 掌握</span>', ok:'<span style="font-size:10px;color:var(--amber)">🤔 模糊</span>', hard:'<span style="font-size:10px;color:var(--red)">❌ 待学</span>'};
  el.innerHTML = S.vocab.map((v,i)=>`
    <div class="vcard">
      <div class="vcard-row" onclick="toggleVcard(${i})">
        <div class="vcard-word">${v.word}</div>
        <span class="chip chip-${v.cat==='biz'?'acc':v.cat==='trade'?'grn':v.cat==='data'?'blu':v.cat==='ielts'?'amb':''}">
          ${catMap[v.cat]||v.cat}
        </span>
        ${v.lastRating ? (ratingBadge[v.lastRating]||'') : ''}
        <div class="vcard-star ${v.starred?'on':''}" onclick="event.stopPropagation();toggleStar(${i})">★</div>
      </div>
      <div class="vcard-body" id="vb${i}">
        <div class="vcard-ph">
          ${v.phonetic||''}
          <button onclick="speak('${v.word}')" style="font-size:11px;background:none;border:1px solid var(--border);border-radius:10px;padding:1px 8px;cursor:pointer;color:var(--text2);margin-left:6px">🔊</button>
        </div>
        <div class="vcard-def">${renderDefsHTML(v)}</div>
        ${v.example?`<div class="vcard-ex">${v.example}${v.exZh?`<span class="vcard-exzh">${v.exZh}</span>`:''}</div>`:''}
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
          <button class="btn btn-sm" style="background:var(--red2);color:var(--red);font-size:11px" onclick="removeWord(${i})">删除</button>
          ${v.reviewCount?`<span style="font-size:11px;color:var(--text3)">复习${v.reviewCount}次</span>`:''}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleVcard(i) { document.getElementById('vb'+i)?.classList.toggle('on'); }
function toggleStar(i) { S.vocab[i].starred=!S.vocab[i].starred; save(); renderVocab(); }
function removeWord(i) { S.vocab.splice(i,1); save(); renderAll(); }

// Daily Vocab — AI generated
async function renderDailyVocab() {
  const el = document.getElementById('vdaily');
  if (isTodayData(S.dailyVocab)) {
    el.innerHTML = renderDailyVocabHTML(S.dailyVocab.words);
    return;
  }
  el.innerHTML = `<div class="art-generating"><span class="spinner spinner-dark"></span><br><br>AI 正在生成今日25个新词...</div>`;
  try {
    const existing = S.vocab.slice(0,30).map(v=>v.word).join(', ');
    const words = await dsJSON(
      `You are an English vocabulary teacher for a Chinese professional at B1+ level transitioning to business analytics and cross-border trade. Generate vocabulary that is practical and workplace-relevant.`,
      `Generate exactly 25 English vocabulary words for today's lesson. Level: B1+ to B2. Focus: business, data analytics, and international trade. 
${existing ? `Avoid these already-known words: ${existing}` : ''}
Return ONLY a JSON array of 25 objects, no other text:
[{"word":"...","phonetic":"/…/","defs":[{"pos":"n.","def":"中文释义1"},{"pos":"v.","def":"中文释义2"},{"pos":"adj.","def":"释义3（如有）"}],"def":"最主要的一个释义","cat":"biz|trade|data|ielts|general","example":"One business example sentence.","exZh":"例句的中文翻译"}]
Rules for defs: each word must have 2-4 real, common meanings with correct part-of-speech labels (n./v./adj./adv./prep./phr.). Only include real usages.`,
      2500
    );
    S.dailyVocab = { date: today(), words };
    save();
    el.innerHTML = renderDailyVocabHTML(words);
  } catch(e) {
    el.innerHTML = `<div class="empty">生成失败: ${e.message}<br><button class="btn btn-sm" style="margin-top:10px" onclick="renderDailyVocab()">重试</button></div>`;
  }
}

function renderDailyVocabHTML(words) {
  const catMap = {biz:'商务',trade:'外贸',data:'数据',general:'通用',ielts:'雅思'};
  const catChip = {biz:'chip-acc',trade:'chip-grn',data:'chip-blu',ielts:'chip-amb',general:''};
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:12px;color:var(--text3)">今日 ${words.length} 个新词</div>
      <button class="btn btn-sm" onclick="addAllDailyWords()">全部加入词汇本</button>
    </div>
    ${words.map((w,i)=>`
      <div class="vcard">
        <div class="vcard-row" onclick="toggleDailyCard(${i})">
          <div class="vcard-word">${w.word}</div>
          <span class="chip ${catChip[w.cat]||''}">${catMap[w.cat]||w.cat}</span>
          <div class="vcard-star" onclick="event.stopPropagation();addOneDailyWord(${i})" title="加入词汇本">+</div>
        </div>
        <div class="vcard-body" id="dvc${i}">
          <div class="vcard-ph">${w.phonetic||''}</div>
          <div class="vcard-def">${renderDefsHTML(w)}</div>
          ${w.example?`<div class="vcard-ex">${w.example}${w.exZh?`<span class="vcard-exzh">${w.exZh}</span>`:''}</div>`:''}
        </div>
      </div>
    `).join('')}
  `;
}

function toggleDailyCard(i) { document.getElementById('dvc'+i)?.classList.toggle('on'); }

function addAllDailyWords() {
  if (!S.dailyVocab?.words) return;
  let added = 0;
  S.dailyVocab.words.forEach(w => {
    if (!S.vocab.find(v=>v.word.toLowerCase()===w.word.toLowerCase())) {
      S.vocab.unshift({...w, starred:false, added:Date.now(), reviewCount:0, lastReview:null});
      added++;
    }
  });
  markActive(); save(); renderAll();
  alert(`已添加 ${added} 个新词到词汇本`);
}

function addOneDailyWord(i) {
  const w = S.dailyVocab?.words[i];
  if (!w) return;
  if (S.vocab.find(v=>v.word.toLowerCase()===w.word.toLowerCase())) return;
  S.vocab.unshift({...w, starred:false, added:Date.now(), reviewCount:0, lastReview:null});
  markActive(); save(); renderHeader();
}

// Manual add
async function addWordManual() {
  const input = document.getElementById('addWordInput');
  const word = input.value.trim();
  const msg = document.getElementById('addWordMsg');
  if (!word) return;
  if (S.vocab.find(v=>v.word.toLowerCase()===word.toLowerCase())) {
    msg.innerHTML = '<div style="color:var(--amber);font-size:12px;padding:6px 0">已在词汇本中</div>'; return;
  }
  msg.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:6px 0"><span class="spinner spinner-dark"></span> AI 查询中...</div>';
  try {
    const w = await dsJSON(
      'You are a vocabulary assistant. Return only JSON, no markdown.',
      `Word: "${word}". Return JSON (include 2-4 real definitions with POS labels):
{"word":"${word}","phonetic":"/…/","defs":[{"pos":"n.","def":"释义"},{"pos":"v.","def":"释义"},{"pos":"adj.","def":"释义（如有）"}],"def":"最主要释义","cat":"biz|trade|data|ielts|general","example":"Business context sentence.","exZh":"中文翻译"}
Only include pos entries that are real usages of this word.`,
      500
    );
    S.vocab.unshift({...w, starred:false, added:Date.now(), reviewCount:0, lastReview:null});
    markActive(); save(); input.value='';
    msg.innerHTML = '<div style="color:var(--green);font-size:12px;padding:6px 0">✓ 已添加</div>';
    setTimeout(()=>{msg.innerHTML='';},2000);
    renderAll();
  } catch(e) {
    msg.innerHTML = `<div style="color:var(--red);font-size:12px;padding:6px 0">失败: ${e.message}</div>`;
  }
}
document.getElementById('addWordInput').addEventListener('keydown',e=>{ if(e.key==='Enter') addWordManual(); });

// Flashcards
let fcRatings = {}; // {word: 'hard'|'ok'|'easy'} — persisted daily
const catMap2 = {biz:'商务',trade:'外贸',data:'数据',ielts:'雅思',general:'通用'};
const catChip2 = {biz:'chip-acc',trade:'chip-grn',data:'chip-blu',ielts:'chip-amb',general:''};

const FC_KEY = ()=>`elab_fc_${today()}`;
function loadFcRatings(){try{const d=localStorage.getItem(FC_KEY());return d?JSON.parse(d):{};}catch(e){return {};}}
function saveFcRatings(){try{localStorage.setItem(FC_KEY(),JSON.stringify(fcRatings));}catch(e){}}

function speak(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function initFlash(clearSaved) {
  if(clearSaved){fcRatings={};saveFcRatings();}else{fcRatings=loadFcRatings();}
  const allQ=S.vocab.filter(v=>!v.lastReview||Date.now()-v.lastReview>86400000);
  const pool=allQ.length?allQ:[...S.vocab];
  flashQueue=pool.filter(v=>!fcRatings[v.word]);
  flashIdx=0;flashRevealed=false;
  renderFlash();
}

function showRatedWords(rating){
  const map={hard:'❌ 不会',ok:'🤔 模糊',easy:'✅ 记住了'};
  const col={hard:'var(--red)',ok:'var(--amber)',easy:'var(--green)'};
  const entries=Object.entries(fcRatings).filter(([w,r])=>r===rating);
  if(!entries.length) return;
  const html=entries.map(([w])=>{
    const v=S.vocab.find(x=>x.word===w);
    const d=v?.defs?.[0]?.def||v?.def||'';
    return `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:8px"><span style="font-family:var(--serif);font-size:15px;font-weight:500;flex:1">${w}</span><span style="font-size:11px;color:var(--text3)">${d}</span></div>`;
  }).join('');
  document.getElementById('overlay').classList.add('on');
  const p=document.getElementById('popup');p.classList.add('on');
  document.getElementById('popupWord').innerHTML=`<span style="color:${col[rating]}">${map[rating]}</span>`;
  document.getElementById('popupPh').textContent=`今日标记了 ${entries.length} 个单词`;
  document.getElementById('popupDef').innerHTML=`<div style="max-height:300px;overflow-y:auto">${html}</div>`;
  document.getElementById('popupAddBtn').style.display='none';
}

function fcDefsHTML(v){
  if(v.defs&&v.defs.length)return v.defs.map((d,i)=>`<div class="fc-def-big" style="${i>0?'font-size:14px;font-weight:500;margin-bottom:8px;':''}"><span style="font-size:11px;background:var(--accent2);color:var(--accent);padding:1px 6px;border-radius:3px;margin-right:5px;font-family:var(--mono)">${d.pos}</span>${d.def}</div>`).join('');
  return `<div class="fc-def-big">${v.def||''}</div>`;
}

function renderFlash() {
  const el = document.getElementById('vflash');
  if (!S.vocab.length) { el.innerHTML='<div class="empty">还没有词汇<br>先去「今日新词」学一批 📖</div>'; return; }
  const hard=Object.values(fcRatings).filter(r=>r==='hard').length;
  const ok=Object.values(fcRatings).filter(r=>r==='ok').length;
  const easy=Object.values(fcRatings).filter(r=>r==='easy').length;
  const tot=hard+ok+easy;

  if (flashIdx >= flashQueue.length) {
    el.innerHTML=`
      <div class="fc-wrap">
        <div style="width:100%;max-width:360px;text-align:center;padding:30px 0">
          <div style="font-size:36px;margin-bottom:12px">${flashQueue.length>0?'🎉':'✅'}</div>
          <div style="font-family:var(--serif);font-size:20px;font-weight:600;margin-bottom:6px">${flashQueue.length>0?'本轮完成！':'今日已全部复习！'}</div>
          <div style="font-size:13px;color:var(--text3);margin-bottom:6px">今日累计评分 ${tot} 个单词</div>
          ${tot?`<div style="font-size:11px;color:var(--accent);background:var(--accent2);border-radius:8px;padding:6px 12px;margin-bottom:16px">💾 记录已自动保存，刷新不丢失</div>`:''}
          <div class="fc-stats-bar">
            <div class="fc-stat hard" onclick="showRatedWords('hard')" style="cursor:${hard?'pointer':'default'}"><span class="n">${hard}</span>不会${hard?'<div style="font-size:9px;opacity:.6">点击查看</div>':''}</div>
            <div class="fc-stat ok" onclick="showRatedWords('ok')" style="cursor:${ok?'pointer':'default'}"><span class="n">${ok}</span>模糊${ok?'<div style="font-size:9px;opacity:.6">点击查看</div>':''}</div>
            <div class="fc-stat easy" onclick="showRatedWords('easy')" style="cursor:${easy?'pointer':'default'}"><span class="n">${easy}</span>记住了${easy?'<div style="font-size:9px;opacity:.6">点击查看</div>':''}</div>
          </div>
          ${hard>0?`<button class="btn" style="width:100%;margin-top:14px" onclick="retryHard()">再练一遍「不会」的 (${hard}词)</button>`:''}
          <button class="btn" style="width:100%;margin-top:10px;background:var(--bg3);color:var(--text2)" onclick="initFlash(true)">清除记录重新开始</button>
        </div>
      </div>`;
    renderHeader(); return;
  }
  const v = flashQueue[flashIdx];
  const pct = Math.round(flashIdx/flashQueue.length*100);
  el.innerHTML=`
    <div class="fc-wrap">
      ${tot>0?`<div style="width:100%;max-width:360px;font-size:11px;color:var(--accent);text-align:right;margin-bottom:4px">💾 已保存 ${tot} 词</div>`:''}
      <div class="fc-stats-bar">
        <div class="fc-stat hard" onclick="${hard?`showRatedWords('hard')`:'void(0)'}" style="cursor:${hard?'pointer':'default'}"><span class="n">${hard}</span>不会</div>
        <div class="fc-stat ok" onclick="${ok?`showRatedWords('ok')`:'void(0)'}" style="cursor:${ok?'pointer':'default'}"><span class="n">${ok}</span>模糊</div>
        <div class="fc-stat easy" onclick="${easy?`showRatedWords('easy')`:'void(0)'}" style="cursor:${easy?'pointer':'default'}"><span class="n">${easy}</span>记住了</div>
        <div class="fc-stat left"><span class="n">${flashQueue.length-flashIdx}</span>剩余</div>
      </div>
      <div class="fc-prog-wrap">
        <div class="fc-prog-bar"><div class="fc-prog-fill" style="width:${pct}%"></div></div>
        <div class="fc-prog-label">${flashIdx}/${flashQueue.length}</div>
      </div>
      <div class="fc" onclick="revealFlash()">
        <div class="fc-front">
          <span class="chip ${catChip2[v.cat]||''} fc-cat-tag">${catMap2[v.cat]||v.cat}</span>
          <div class="fc-word">${v.word}</div>
          <div class="fc-ph-row">
            ${v.phonetic?`<span class="fc-ph">${v.phonetic}</span>`:''}
            <button class="fc-speak" onclick="event.stopPropagation();speak('${v.word}')">🔊 朗读</button>
          </div>
          ${!flashRevealed?`<div class="fc-hint">点击卡片查看释义</div>`:''}
        </div>
        ${flashRevealed?`
          <div class="fc-back">
            <div class="fc-pos">${v.cat==='biz'?'business':v.cat==='trade'?'trade':v.cat==='data'?'data/analytics':'vocabulary'}</div>
            ${fcDefsHTML(v)}
            ${v.example?`
              <div class="fc-ex-wrap">
                <div class="fc-ex-en">${v.example}</div>
                ${v.exZh?`<div class="fc-ex-zh">${v.exZh}</div>`:''}
              </div>`:''
            }
            ${v.reviewCount>=3?`<div class="fc-mem">📌 已复习 ${v.reviewCount} 次${v.mastered?' · ✅ 已掌握':''}</div>`:''}
          </div>`:''
        }
      </div>
      ${flashRevealed?`
        <div class="fc-actions">
          <button class="fc-btn hard" onclick="rateFlash('hard')"><span class="fc-btn-icon">😣</span>不会</button>
          <button class="fc-btn ok" onclick="rateFlash('ok')"><span class="fc-btn-icon">🤔</span>模糊</button>
          <button class="fc-btn easy" onclick="rateFlash('easy')"><span class="fc-btn-icon">😊</span>记住了</button>
        </div>`:''}
    </div>`;
}

function revealFlash() { flashRevealed=true; renderFlash(); speak(flashQueue[flashIdx]?.word||''); }

function rateFlash(r) {
  const v=flashQueue[flashIdx];
  fcRatings[v.word]=r;
  saveFcRatings();
  const orig=S.vocab.find(w=>w.word===v.word);
  if(orig){
    orig.lastReview=Date.now();
    orig.reviewCount=(orig.reviewCount||0)+1;
    orig.lastRating=r;
    if(r==='easy') orig.mastered=true;
    else if(r==='hard') orig.mastered=false;
  }
  save(); flashIdx++; flashRevealed=false; renderFlash();
}

function retryHard() {
  const hw=Object.entries(fcRatings).filter(([w,r])=>r==='hard').map(([w])=>w);
  hw.forEach(w=>delete fcRatings[w]);
  saveFcRatings();
  flashQueue=S.vocab.filter(v=>hw.includes(v.word));
  flashIdx=0;flashRevealed=false;renderFlash();
}

function renderArticleCard(a) {
  return `
    <div class="art-card fade-up" onclick="openArticle()">
      <div class="art-cat">${a.category||'Business'}</div>
      <div class="art-title">${a.title}</div>
      <div class="art-desc">点击开始阅读 · 生词高亮可查释义</div>
      <div class="art-meta">
        <span>📖 ${a.level||'B1-B2'}</span>
        <span>⏱ ${a.readTime||'5 min'}</span>
        <span>❓ ${(a.questions||[]).length}题</span>
      </div>
    </div>
  `;
}

let qAnswers = {};

function openArticle() {
  const a = S.dailyReading?.article;
  if (!a) return;
  // Load saved answers for today
  try {
    const saved = localStorage.getItem('elab_qanswers');
    const parsed = saved ? JSON.parse(saved) : {};
    qAnswers = (parsed.date === today()) ? parsed.answers : {};
  } catch(e) { qAnswers = {}; }

  document.getElementById('readList').style.display='none';
  const el = document.getElementById('readArticle');
  el.style.display='block';

  const kwMap = {};
  (a.keywords||[]).forEach(k=>{ kwMap[k.word.toLowerCase()]={...k}; });

  function hlPara(text) {
    let out = text;
    Object.entries(kwMap).forEach(([w,info])=>{
      const re = new RegExp(`\\b(${w})\\b`,'gi');
      out = out.replace(re, `<span class="hl" onclick="showPopup('${info.word}','${info.phonetic||''}','${(info.def||'').replace(/'/g,"\\'")}')">$1</span>`);
    });
    return out;
  }

  el.innerHTML = `
    <button class="reader-back" onclick="closeArticle()">← 返回</button>
    <div class="art-cat">${a.category||'Business'}</div>
    <div class="reader-title">${a.title}</div>
    <div class="reader-meta">
      <span class="chip chip-acc">${a.level||'B1-B2'}</span>
      <span class="chip chip-blu">${a.readTime||'5 min'}</span>
    </div>
    <div class="reader-body">
      ${(a.paragraphs||[]).map(p=>`<p>${hlPara(p)}</p>`).join('')}
    </div>
    <div class="reader-q">
      <div class="reader-q-title">理解问题</div>
      ${(a.questions||[]).map((q,qi)=>`
        <div class="q-item" id="qi${qi}">
          <div class="q-text">${qi+1}. ${q.q}</div>
          <div class="q-opts">
            ${q.opts.map((o,oi)=>`
              <button class="q-opt" id="qo${qi}-${oi}" onclick="answerQ(${qi},${oi},${q.answer})">${o}</button>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;

  // Restore saved answers
  Object.entries(qAnswers).forEach(([qi, data]) => {
    const {chosen, correct} = data;
    const chosenEl = document.getElementById(`qo${qi}-${chosen}`);
    const correctEl = document.getElementById(`qo${qi}-${correct}`);
    if (chosenEl) chosenEl.classList.add(chosen==correct ? 'correct' : 'wrong');
    if (correctEl && chosen!=correct) correctEl.classList.add('correct');
  });
}

function answerQ(qi, oi, correct) {
  if (qAnswers[qi] !== undefined) return;
  qAnswers[qi] = {chosen: oi, correct};
  // Save to localStorage
  try {
    localStorage.setItem('elab_qanswers', JSON.stringify({date: today(), answers: qAnswers}));
  } catch(e) {}
  const selected = document.getElementById(`qo${qi}-${oi}`);
  const correctEl = document.getElementById(`qo${qi}-${correct}`);
  if (oi===correct) { selected.classList.add('correct'); }
  else { selected.classList.add('wrong'); correctEl.classList.add('correct'); }
}

function closeArticle() {
  document.getElementById('readList').style.display='block';
  document.getElementById('readArticle').style.display='none';
}

        <div style="padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.5">
          ${i+1}. ${q}
        </div>
      `).join('')}
      <div style="margin-top:10px;font-size:11px;color:var(--text3)">可以用英文在「日志」里写下你的回答</div>
    </div>
    <button class="btn" style="width:100%;margin-top:4px" onclick="gotoTab('log')">📝 去记录今日听力 →</button>
  `;
}

function answerListenQ(qi, oi, correct, explain) {
  if (listenQAnswers[qi]!==undefined) return;
  listenQAnswers[qi]={chosen:oi,correct};
  try{localStorage.setItem('elab_lqa',JSON.stringify({date:today(),answers:listenQAnswers}));}catch(e){}
  const sel=document.getElementById(`lqo${qi}-${oi}`);
  const cor=document.getElementById(`lqo${qi}-${correct}`);
  if(oi===correct){sel.classList.add('correct');}
  else{sel.classList.add('wrong');cor.classList.add('correct');}
  if(explain){
    const d=document.createElement('div');
    d.style.cssText='margin-top:8px;font-size:11px;color:var(--text3);padding:6px 10px;background:var(--bg3);border-radius:6px';
    d.textContent=explain;
    document.getElementById(`lqi${qi}`).appendChild(d);
  }
}

function speakFast(text) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=1.0;
  window.speechSynthesis.speak(u);
}

// ══════════════════════════════════════════
// WRITING
// ══════════════════════════════════════════
const WRITE_CATS = [
  {label:'商务邮件', color:'var(--accent)', chip:'chip-acc'},
  {label:'数据报告', color:'var(--blue)', chip:'chip-blu'},
  {label:'外贸询盘', color:'var(--green)', chip:'chip-grn'},
  {label:'自我介绍', color:'var(--amber)', chip:'chip-amb'},
  {label:'周报摘要', color:'var(--text2)', chip:''},
];
let currentWritePrompt = null;

// Writing only on Wednesday (3) and Saturday (6)
function isWritingDay() {
  return [3, 6].includes(new Date().getDay());
}
function daysUntilNextWriting() {
  const day = new Date().getDay();
  // next Wed or Sat
  const targets = [3, 6];
  const diffs = targets.map(t => (t - day + 7) % 7 || 7);
  return Math.min(...diffs);
}

async function renderWritePrompts() {
  const el = document.getElementById('writePrompts');
  if (!isWritingDay()) {
    const d = daysUntilNextWriting();
    const next = new Date().getDay() < 3 ? '周三' : '周六';
    el.innerHTML = `
      <div class="card" style="text-align:center;padding:32px 20px">
        <div style="font-size:32px;margin-bottom:12px">☕</div>
        <div style="font-family:var(--serif);font-size:17px;font-weight:600;color:var(--text);margin-bottom:8px">今天不用写作</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.7">写作日是<b>周三 + 周六</b><br>距离下次写作还有 <b style="color:var(--accent)">${d}天</b>（${next}）</div>
        <div style="margin-top:16px;font-size:12px;color:var(--text3)">今天可以多复习词汇或做阅读 👌</div>
      </div>
      ${S.writingCount > 0 ? `<div class="sec-title" style="margin-top:16px">历史记录</div>
      <div class="card"><div style="font-size:13px;color:var(--text2)">累计完成写作 <b style="color:var(--accent)">${S.writingCount}</b> 篇 🎉</div></div>` : ''}
    `;
    return;
  }
  if (isTodayData(S.dailyWriting)) {
    el.innerHTML = renderPromptCards(S.dailyWriting.prompts);
    return;
  }
  el.innerHTML = `<div class="art-generating"><span class="spinner spinner-dark"></span><br><br>AI 正在生成本周写作题目...</div>`;
  try {
    const prompts = await dsJSON(
      'You are a business English writing teacher for Chinese professionals at B1-B2 level.',
      `Generate 1 writing prompt. Today is a writing practice day (Wednesday or Saturday). Make it practical and realistic. Pick one type: business email, data report, or trade inquiry.
Return ONLY JSON array with 1 item:
[{"cat":"商务邮件|数据报告|外贸询盘|自我介绍|周报摘要","prompt":"English writing task description (2-3 sentences)","hint":"中文提示：字数要求和写作要点","minWords":80}]`,
      400
    );
    S.dailyWriting = { date: today(), prompts };
    save();
    el.innerHTML = renderPromptCards(prompts);
  } catch(e) {
    el.innerHTML = `<div class="empty">生成失败: ${e.message}<br><button class="btn btn-sm" style="margin-top:10px" onclick="renderWritePrompts()">重试</button></div>`;
  }
}

function renderPromptCards(prompts) {
  const catColor = {'商务邮件':'var(--accent)','数据报告':'var(--blue)','外贸询盘':'var(--green)','自我介绍':'var(--amber)','周报摘要':'var(--text2)'};
  return prompts.map((p,i)=>`
    <div class="prompt-card" onclick="startWriting(${i})">
      <div class="prompt-cat" style="color:${catColor[p.cat]||'var(--accent)'}">${p.cat}</div>
      <div class="prompt-text">${p.prompt}</div>
      <div class="prompt-hint">${p.hint}</div>
    </div>
  `).join('');
}

function startWriting(i) {
  currentWritePrompt = S.dailyWriting?.prompts?.[i];
  if (!currentWritePrompt) return;
  document.getElementById('writePrompts').style.display='none';
  document.getElementById('writeEditor').style.display='block';
  const catColor = {'商务邮件':'var(--accent)','数据报告':'var(--blue)','外贸询盘':'var(--green)','自我介绍':'var(--amber)','周报摘要':'var(--text2)'};
  document.getElementById('writeCurrentPrompt').innerHTML = `
    <div class="prompt-card" style="cursor:default;margin-bottom:14px">
      <div class="prompt-cat" style="color:${catColor[currentWritePrompt.cat]||'var(--accent)'}">${currentWritePrompt.cat}</div>
      <div class="prompt-text">${currentWritePrompt.prompt}</div>
      <div class="prompt-hint">${currentWritePrompt.hint}</div>
    </div>`;
  document.getElementById('writeInput').value='';
  document.getElementById('writeFeedback').style.display='none';
}

function backToPrompts() {
  document.getElementById('writePrompts').style.display='block';
  document.getElementById('writeEditor').style.display='none';
  currentWritePrompt = null;
}

async function submitWriting() {
  const text = document.getElementById('writeInput').value.trim();
  if (!text || text.split(/\s+/).length < 10) { alert('请至少写10个词再提交'); return; }
  const btn = document.getElementById('submitWriteBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> 批改中...';
  try {
    const fb = await dsJSON(
      'You are a business English writing coach for Chinese professionals at B1-B2 level. Provide constructive, encouraging feedback.',
      `Writing task: "${currentWritePrompt?.prompt}"
Student wrote:
"""
${text}
"""
Return ONLY JSON:
{"score":85,"grammarErrors":[{"error":"wrong phrase","fix":"correct phrase","explain":"简短中文解释"}],"styleFeedback":"中文点评整体风格(1-2句)","vocabFeedback":"中文点评词汇，推荐2-3个可替换的高级词","improvedVersion":"Complete improved version in English","encouragement":"鼓励的话(中文,1句)"}
Limit grammar errors to top 3. Score out of 100.`,
      900
    );
    const el = document.getElementById('writeFeedback');
    el.style.display='block';
    el.innerHTML = `
      <div class="card">
        <div class="fb-block">
          <div class="fb-label">评分</div>
          <div class="fb-score">${fb.score}<span style="font-size:14px;color:var(--text3)">/100</span></div>
        </div>
        ${(fb.grammarErrors||[]).length?`
        <div class="fb-block">
          <div class="fb-label">语法修正</div>
          ${fb.grammarErrors.map(g=>`
            <div style="margin-bottom:8px;font-size:13px;line-height:1.6;padding:8px;background:var(--bg3);border-radius:6px">
              <span style="color:var(--red);text-decoration:line-through">${g.error}</span>
              <span style="color:var(--text3)"> → </span>
              <span style="color:var(--green);font-weight:500">${g.fix}</span>
              <div style="font-size:11px;color:var(--text3);margin-top:3px">${g.explain}</div>
            </div>
          `).join('')}
        </div>`:''} 
        <div class="fb-block">
          <div class="fb-label">风格点评</div>
          <div class="fb-text">${fb.styleFeedback||''}</div>
        </div>
        <div class="fb-block">
          <div class="fb-label">词汇建议</div>
          <div class="fb-text">${fb.vocabFeedback||''}</div>
        </div>
        <div class="fb-block">
          <div class="fb-label">改进版本</div>
          <div class="improved-text">${fb.improvedVersion||''}</div>
        </div>
        <div style="padding:12px;background:var(--accent2);border-radius:8px;font-size:13px;color:var(--accent)">${fb.encouragement||''}</div>
      </div>
    `;
    S.writingCount++; markActive(); save(); renderHeader();
  } catch(e) {
    document.getElementById('writeFeedback').style.display='block';
    document.getElementById('writeFeedback').innerHTML=`<div class="card" style="color:var(--red)">批改失败: ${e.message}</div>`;
  }
  btn.disabled=false; btn.innerHTML='AI 批改';
}

// ══════════════════════════════════════════
// POPUP
// ══════════════════════════════════════════
let popupData = {};
function showPopup(word, ph, def) {
  popupData = {word, ph, def};
  document.getElementById('popupWord').textContent = word;
  document.getElementById('popupPh').textContent = ph;
  document.getElementById('popupDef').textContent = def;
  const exists = S.vocab.find(v=>v.word.toLowerCase()===word.toLowerCase());
  document.getElementById('popupAddBtn').style.display = exists?'none':'inline-flex';
  document.getElementById('popup').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}
function closePopup() {
  document.getElementById('popup').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('popupAddBtn').style.display='inline-flex';
}
function addFromPopup() {
  const {word, ph, def} = popupData;
  if (!word||S.vocab.find(v=>v.word.toLowerCase()===word.toLowerCase())) return;
  S.vocab.unshift({word,phonetic:ph,def,cat:'general',example:'',exZh:'',starred:false,added:Date.now(),reviewCount:0,lastReview:null});
  markActive(); save(); renderAll(); closePopup();
}

// ══════════════════════════════════════════
// LOG
// ══════════════════════════════════════════
function addLog() {
  const text = document.getElementById('logText').value.trim();
  if (!text) return;
  S.logs.unshift({
    date: new Date().toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',weekday:'short'}),
    type: document.getElementById('logType').value,
    mins: parseInt(document.getElementById('logMins').value)||0,
    text, ts: Date.now()
  });
  markActive(); save();
  document.getElementById('logText').value='';
  document.getElementById('logMins').value='';
  renderAll();
}
function renderLogList() {
  const el = document.getElementById('logList');
  if (!S.logs.length) { el.innerHTML='<div class="empty">还没有学习记录<br>今天开始吧 📝</div>'; return; }
  el.innerHTML = S.logs.map(l=>`
    <div class="log-entry">
      <div class="log-meta">
        <span>${l.date}</span>
        ${l.type?`<span style="color:var(--accent)">${l.type}</span>`:''}
        ${l.mins?`<span style="color:var(--amber)">${l.mins}min</span>`:''}
      </div>
      <div class="log-body">${l.text}</div>

  `).join('');
}

// ══════════════════════════════════════════
// BIWEEKLY TEST
// ══════════════════════════════════════════
async function startBiweeklyTest() {
  gotoTab('test');
  const el = document.getElementById('testContent');
  el.innerHTML = `<div class="art-generating"><span class="spinner spinner-dark"></span><br><br>AI 正在生成测验题目...</div>`;
  const knownWords = S.vocab.slice(0,40).map(v=>v.word).join(', ');
  try {
    const test = await dsJSON(
      'You are an English test creator. Generate precise, fair multiple choice questions.',
      `Generate a 15-question vocabulary and comprehension test for a B1-B2 Chinese learner.
Draw from these words they have studied: ${knownWords || 'common business vocabulary'}.
Mix question types: definition matching, fill-in-blank, context usage.
Return ONLY JSON:
{"questions":[{"q":"Question text (use blank ___ for fill-in)","opts":["A...","B...","C...","D..."],"answer":0,"explain":"简短中文解释为什么选这个"}]}`,
      1200
    );
    renderTest(test.questions);
  } catch(e) {
    el.innerHTML = `<div class="empty">生成失败: ${e.message}<br><button class="btn btn-sm" style="margin-top:10px" onclick="startBiweeklyTest()">重试</button></div>`;
  }
}

let testAnswers={}, testQuestions=[];
function renderTest(questions) {
  testQuestions=questions; testAnswers={};
  const el = document.getElementById('testContent');
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-family:var(--serif);font-size:18px;font-weight:600">两周测验</div>
      <span class="chip chip-acc">15题</span>
    </div>
    ${questions.map((q,qi)=>`
      <div class="test-q" id="tq${qi}">
        <div class="test-qnum">第 ${qi+1} 题</div>
        <div class="test-qtext">${q.q}</div>
        <div class="test-opts">
          ${q.opts.map((o,oi)=>`
            <button class="test-opt" id="to${qi}-${oi}" onclick="answerTest(${qi},${oi})">${o}</button>
          `).join('')}
        </div>
      </div>
    `).join('')}
    <button class="btn" style="width:100%;margin-top:4px" onclick="submitTest()">提交答案</button>
  `;
}

function answerTest(qi, oi) {
  if (testAnswers[qi]!==undefined) return;
  testAnswers[qi]=oi;
  document.getElementById(`to${qi}-${oi}`).classList.add('selected');
}

function submitTest() {
  if (Object.keys(testAnswers).length < testQuestions.length) {
    alert('请回答所有题目再提交'); return;
  }
  let score=0;
  testQuestions.forEach((q,qi)=>{
    const ans=testAnswers[qi];
    const correct=q.answer;
    document.getElementById(`to${qi}-${ans}`).classList.remove('selected');
    if (ans===correct) { document.getElementById(`to${qi}-${ans}`).classList.add('correct'); score++; }
    else {
      document.getElementById(`to${qi}-${ans}`).classList.add('wrong');
      document.getElementById(`to${qi}-${correct}`).classList.add('correct');
    }
    // show explain
    const tq = document.getElementById(`tq${qi}`);
    if (q.explain) {
      const d=document.createElement('div');
      d.style.cssText='margin-top:8px;font-size:11px;color:var(--text3);padding:6px 10px;background:var(--bg3);border-radius:6px';
      d.textContent=q.explain;
      tq.appendChild(d);
    }
  });
  S.testHistory.push({date:new Date().toLocaleDateString('zh-CN'),score,total:testQuestions.length});
  S.dayCount = (S.dayCount||0)+1;
  save(); renderDash();
  const el = document.getElementById('testContent');
  const resultDiv = document.createElement('div');
  resultDiv.style.cssText='position:sticky;bottom:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;text-align:center;box-shadow:var(--shadow2)';
  resultDiv.innerHTML=`
    <div style="font-family:var(--mono);font-size:28px;font-weight:500;color:var(--accent)">${score}/${testQuestions.length}</div>
    <div style="font-size:13px;color:var(--text2);margin-top:4px">${score>=12?'🎉 优秀！继续保持':score>=9?'👍 良好，再接再厉':'💪 加油，多复习词汇'}</div>
    <button class="btn" style="margin-top:12px;width:100%" onclick="gotoTab('dash')">返回首页</button>
  `;
  el.insertBefore(resultDiv, el.firstChild);
  el.scrollTop=0;
}

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
function gotoTab(tab) {
  const tabs=['dash','vocab','read','listen','write','log','test'];
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('on',tabs[i]===tab));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('on',v.id==='view-'+tab));
  // Lazy load
  if (tab==='read' && !isTodayData(S.dailyReading)) renderReadList();
  if (tab==='read' && isTodayData(S.dailyReading)) { document.getElementById('readList').innerHTML=renderArticleCard(S.dailyReading.article); }
  if (tab==='listen') renderListenContent();
  if (tab==='write') renderWritePrompts();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
load();
if (S.key) {
  document.getElementById('view-setup').classList.remove('on');
  updateStreak();
  renderAll();
  gotoTab('dash');
  // Show test tab in nav if biweekly
  const daysIn = S.dayCount||1;
  if ((daysIn-1)%14===0 && daysIn>1) {
    const testBtn=document.createElement('button');
    testBtn.className='nav-btn';
    testBtn.textContent='📝测验';
    testBtn.onclick=()=>startBiweeklyTest();
    document.querySelector('.nav').appendChild(testBtn);
  }
} else {
  document.getElementById('view-setup').classList.add('on');
}
</script>
