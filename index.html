<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Lab</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="English Lab">
<meta name="theme-color" content="#F7F4EF">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');
:root{
  --bg:#F7F4EF;--bg2:#FFFFFF;--bg3:#EFECE6;--bg4:#E8E4DC;
  --border:#E2DDD5;--border2:#CFC9BF;
  --text:#28241E;--text2:#6B6560;--text3:#9E9890;
  --accent:#C8520A;--accent2:rgba(200,82,10,.1);--accent3:rgba(200,82,10,.06);
  --green:#2E7D52;--green2:rgba(46,125,82,.1);
  --blue:#2D5FA0;--blue2:rgba(45,95,160,.1);
  --amber:#B07820;--amber2:rgba(176,120,32,.1);
  --red:#B83030;--red2:rgba(184,48,48,.1);
  --purple:#6B4FA0;--purple2:rgba(107,79,160,.1);
  --serif:'Lora',Georgia,serif;
  --mono:'DM Mono',monospace;
  --sans:'Noto Sans SC',-apple-system,sans-serif;
  --r:12px;--shadow:0 1px 4px rgba(0,0,0,.06);--shadow2:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 18px 12px;flex-shrink:0}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.hdr-brand{font-family:var(--serif);font-size:19px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
.hdr-brand span{color:var(--accent)}
.hdr-level{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.hdr-right{text-align:right}
.hdr-streak{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--accent);line-height:1}
.hdr-slabel{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.hdr-stats{display:flex;gap:14px}
.hdr-stat{font-family:var(--mono);font-size:10px;color:var(--text3)}
.hdr-stat b{color:var(--text2);font-weight:500}
.token-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:2px 8px;margin-left:8px}
.token-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:1;min-width:52px;padding:9px 4px;font-size:11px;font-family:var(--sans);color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.main{flex:1;overflow-y:auto;padding:16px 18px 80px;-webkit-overflow-scrolling:touch}
.main::-webkit-scrollbar{width:2px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.view{display:none}.view.on{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.sec-title{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn:active{opacity:.8}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:none;color:var(--accent);border:1px solid var(--border)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.chip{display:inline-flex;align-items:center;font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.chip-acc{background:var(--accent2);color:var(--accent)}
.chip-grn{background:var(--green2);color:var(--green)}
.chip-blu{background:var(--blue2);color:var(--blue)}
.chip-amb{background:var(--amber2);color:var(--amber)}
.chip-red{background:var(--red2);color:var(--red)}
.chip-pur{background:var(--purple2);color:var(--purple)}
.input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--accent)}.input::placeholder{color:var(--text3)}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
.spinner-dark{border-color:var(--border);border-top-color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 0;font-size:13px;color:var(--text3);line-height:2}
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.fchip{font-size:11px;font-family:var(--sans);padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s}
.fchip.on{border-color:var(--accent);color:var(--accent);background:var(--accent3)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease}
.setup-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:20px}
.setup-icon{font-size:48px;margin-bottom:16px}
.setup-title{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--text);margin-bottom:8px}
.setup-desc{font-size:13px;color:var(--text2);line-height:1.7;max-width:300px;margin-bottom:24px}
.key-input-wrap{width:100%;max-width:340px;margin-bottom:12px}
.key-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:12px;font-family:var(--mono);color:var(--text);outline:none;transition:border-color .15s}
.key-input:focus{border-color:var(--accent)}.key-input::placeholder{color:var(--text3)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;box-shadow:var(--shadow)}
.dash-label{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.dash-val{font-size:21px;font-family:var(--mono);font-weight:500;color:var(--text)}
.dash-val .u{font-size:11px;color:var(--text3);font-weight:400}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.cl-item:last-child{border-bottom:none}
.cl-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all .15s;flex-shrink:0;margin-top:1px}
.cl-check.done{background:var(--green);border-color:var(--green);color:#fff}
.cl-check.auto{border-style:dashed;border-color:var(--green);color:var(--green);cursor:default}
.cl-check.auto.done{border-style:solid;background:var(--green);color:#fff}
.cl-body{flex:1;min-width:0}
.cl-label{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.cl-label.done{text-decoration:line-through;color:var(--text3)}
.cl-hint{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.cl-tag{display:inline-block;font-size:9px;font-family:var(--mono);padding:1px 6px;border-radius:3px;margin-right:4px;text-transform:uppercase;letter-spacing:.03em}
.cl-tag-tool{background:var(--accent2);color:var(--accent)}
.cl-tag-ext{background:var(--purple2);color:var(--purple)}
.cl-tag-listen{background:var(--blue2);color:var(--blue)}
.cl-tag-speak{background:var(--green2);color:var(--green)}
.cl-tag-read{background:var(--amber2);color:var(--amber)}
.cl-summary{display:flex;align-items:center;gap:10px;padding:10px 0;margin-bottom:4px}
.cl-pct{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--accent)}
.prog-phase{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.prog-phase-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.prog-phase-desc{font-size:11px;color:var(--text3);margin-bottom:8px}
.prog-phase-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-phase-fill{height:100%;border-radius:3px;transition:width .5s ease}
.prog-phase-label{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px;text-align:right}
.prog-heatmap{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:14px}
.prog-day{width:100%;aspect-ratio:1;border-radius:4px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:var(--text3);position:relative}
.prog-day.today{border-color:var(--accent);border-width:2px}
.prog-day.full{background:var(--green);border-color:var(--green);color:#fff}
.prog-day.partial{background:var(--amber2);border-color:var(--amber);color:var(--amber)}
.prog-day.future{opacity:.4}
.prog-day.paused{background:var(--red2);border-color:var(--red);color:var(--red);font-size:8px}
.prog-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.prog-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center;box-shadow:var(--shadow)}
.prog-stat-val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--text)}
.prog-stat-label{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.vcard-row{padding:12px 15px;display:flex;align-items:center;gap:10px;cursor:pointer}
.vcard-word{font-family:var(--serif);font-size:16px;font-weight:500;color:var(--text);flex:1}
.vcard-star{font-size:15px;color:var(--border2);cursor:pointer;transition:color .15s;padding:2px}
.vcard-star.on{color:var(--amber)}
.vcard-body{display:none;padding:0 15px 13px;border-top:1px solid var(--border)}
.vcard-body.on{display:block}
.vcard-ph{font-family:var(--mono);font-size:11px;color:var(--text3);margin:8px 0 5px}
.vcard-def{font-size:13px;color:var(--text2);margin-bottom:6px;line-height:1.6}
.pos-tag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent);background:var(--accent2);padding:1px 5px;border-radius:3px;margin-right:4px;text-transform:lowercase}
.vcard-ex{font-family:var(--serif);font-size:13px;color:var(--text2);font-style:italic;padding:8px 11px;background:var(--bg3);border-radius:6px;line-height:1.6}
.vcard-exzh{font-style:normal;font-family:var(--sans);font-size:11px;color:var(--text3);margin-top:4px;display:block}
.fc-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0}
.fc-stats-bar{display:flex;gap:8px;margin-bottom:12px;width:100%;max-width:360px}
.fc-stat{flex:1;text-align:center;padding:7px 4px;border-radius:8px;font-size:11px;font-family:var(--mono)}
.fc-stat .n{font-size:18px;font-weight:600;display:block;line-height:1.2}
.fc-stat.hard{background:var(--red2);color:var(--red)}
.fc-stat.ok{background:var(--amber2);color:var(--amber)}
.fc-stat.easy{background:var(--green2);color:var(--green)}
.fc-stat.left{background:var(--bg3);color:var(--text3)}
.fc-prog-wrap{width:100%;max-width:360px;margin-bottom:14px}
.fc-prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.fc-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.fc-prog-label{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px;text-align:right}
.fc{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow2);overflow:hidden;cursor:pointer;transition:transform .15s;user-select:none}
.fc:active{transform:scale(.99)}
.fc-front{padding:36px 24px 28px;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fc-cat-tag{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;padding:2px 10px;border-radius:10px;margin-bottom:16px;display:inline-block}
.fc-word{font-family:var(--serif);font-size:34px;font-weight:600;color:var(--text);line-height:1.2}
.fc-ph-row{display:flex;align-items:center;gap:10px;margin-top:10px;justify-content:center}
.fc-ph{font-family:var(--mono);font-size:13px;color:var(--text3)}
.fc-speak{background:none;border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s}
.fc-speak:active{background:var(--bg3)}
.fc-hint{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:16px;padding:6px 14px;background:var(--bg3);border-radius:20px}
.fc-back{border-top:2px solid var(--border);padding:20px 24px 24px;background:var(--bg)}
.fc-pos{font-size:10px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.fc-def-big{font-size:17px;font-weight:600;color:var(--text);margin-bottom:12px;line-height:1.4}
.fc-ex-wrap{background:var(--bg2);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.fc-ex-en{font-family:var(--serif);font-size:14px;color:var(--text);font-style:italic;line-height:1.6;margin-bottom:4px}
.fc-ex-zh{font-size:12px;color:var(--text3);line-height:1.5}
.fc-actions{display:flex;gap:8px;margin-top:14px;width:100%;max-width:360px}
.fc-btn{flex:1;padding:14px 6px;border:none;border-radius:12px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.fc-btn:active{transform:scale(.96)}
.fc-btn .fc-btn-icon{font-size:18px}
.fc-btn.hard{background:var(--red2);color:var(--red)}
.fc-btn.ok{background:var(--amber2);color:var(--amber)}
.fc-btn.easy{background:var(--green2);color:var(--green)}
.art-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.art-cat{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:5px}
.art-title{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:5px}
.art-desc{font-size:12px;color:var(--text3);line-height:1.5}
.art-meta{display:flex;gap:10px;margin-top:8px}
.art-meta span{font-family:var(--mono);font-size:10px;color:var(--text3)}
.art-generating{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.reader-back{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:4px 0;margin-bottom:14px;display:inline-flex;align-items:center;gap:4px}
.reader-title{font-family:var(--serif);font-size:21px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:14px}
.reader-meta{display:flex;gap:10px;margin-bottom:16px}
.reader-body{font-family:var(--serif);font-size:16px;color:var(--text);line-height:1.85}
.reader-body p{margin-bottom:14px}
.hl{background:var(--accent2);padding:1px 2px;border-radius:3px;cursor:pointer;border-bottom:1px solid rgba(200,82,10,.3)}
.reader-q{margin-top:20px}
.reader-q-title{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:12px;padding-top:16px;border-top:1px solid var(--border)}
.q-item{margin-bottom:16px}.q-text{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5}
.q-opts{display:flex;flex-direction:column;gap:6px}
.q-opt{padding:10px 13px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;background:var(--bg2);transition:all .15s;text-align:left}
.q-opt.selected{border-color:var(--accent);background:var(--accent2);color:var(--accent);font-weight:500}
.q-opt.correct{border-color:var(--green);background:var(--green2);color:var(--green)}
.q-opt.wrong{border-color:var(--red);background:var(--red2);color:var(--red)}
.dlg-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.dlg-scene{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--purple);margin-bottom:6px}
.dlg-title{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:4px}
.dlg-hint{font-size:12px;color:var(--text3);line-height:1.5}
.dlg-bubble{padding:10px 14px;border-radius:12px;margin-bottom:8px;max-width:85%;font-size:13px;line-height:1.6;position:relative}
.dlg-bubble.client{background:var(--blue2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.dlg-bubble.you{background:var(--accent2);color:var(--text);align-self:flex-end;margin-left:auto;border-bottom-right-radius:4px}
.dlg-role{font-size:10px;font-family:var(--mono);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.dlg-bubble.client .dlg-role{color:var(--blue)}
.dlg-bubble.you .dlg-role{color:var(--accent)}
.dlg-en{font-family:var(--serif);margin-bottom:4px}
.dlg-zh{font-size:11px;color:var(--text3);display:none}.dlg-zh.show{display:block}
.dlg-flow{display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
.dlg-toggle{font-size:11px;color:var(--accent);background:var(--accent3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;margin-bottom:14px;display:inline-block}
.dlg-keys{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.dlg-key-title{font-size:11px;font-family:var(--mono);color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.dlg-key-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.dlg-key-item:last-child{border-bottom:none}
.dlg-key-en{font-family:var(--serif);font-size:14px;color:var(--text);font-weight:500;flex:1}
.dlg-key-zh{font-size:12px;color:var(--text3);flex:1}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:99;display:none}.overlay.on{display:block}
.popup{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--bg2);border-radius:18px 18px 0 0;border-top:1px solid var(--border);padding:20px 20px 32px;box-shadow:0 -4px 24px rgba(0,0,0,.12);transition:transform .28s cubic-bezier(.32,.72,0,1);z-index:100}
.popup.on{transform:translateX(-50%) translateY(0)}
.popup-close{position:absolute;right:16px;top:16px;background:var(--bg3);border:none;width:28px;height:28px;border-radius:50%;font-size:14px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.popup-word{font-family:var(--serif);font-size:22px;font-weight:600}
.popup-ph{font-family:var(--mono);font-size:12px;color:var(--text3);margin-top:3px}
.popup-def{font-size:14px;color:var(--text2);margin-top:10px;line-height:1.6}
.test-q{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.test-qnum{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.test-qtext{font-size:14px;color:var(--text);margin-bottom:12px;line-height:1.6;font-family:var(--serif)}
.test-opts{display:flex;flex-direction:column;gap:7px}
.test-opt{padding:10px 13px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;background:var(--bg2);transition:all .15s;text-align:left}
.test-opt.selected{border-color:var(--accent);background:var(--accent2);color:var(--accent)}
.test-opt.correct{border-color:var(--green);background:var(--green2);color:var(--green)}
.test-opt.wrong{border-color:var(--red);background:var(--red2);color:var(--red)}
.pause-banner{background:var(--red2);border:1px solid var(--red);border-radius:var(--r);padding:12px 15px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2);line-height:1.4}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-brand">English<span>.</span>Lab</div>
        <div class="hdr-level" id="hdrLevel">B1-B2 · 综合提升</div>
      </div>
      <div class="hdr-right">
        <div class="hdr-streak" id="hdrStreak">0</div>
        <div class="hdr-slabel">day streak</div>
      </div>
    </div>
    <div class="hdr-stats">
      <div class="hdr-stat">词汇 <b id="hVocab">0</b></div>
      <div class="hdr-stat">Day <b id="hDay">0</b>/90</div>
      <div class="hdr-stat">对话 <b id="hDialogue">0</b>篇</div>
      <div class="token-badge"><span class="token-dot"></span><span id="tokenCount">0</span>k tokens</div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn on" onclick="gotoTab('dash')">今日</button>
    <button class="nav-btn" onclick="gotoTab('vocab')">词汇</button>
    <button class="nav-btn" onclick="gotoTab('dialogue')">情景</button>
    <button class="nav-btn" onclick="gotoTab('read')">阅读</button>
    <button class="nav-btn" onclick="gotoTab('progress')">进度</button>
  </div>
  <div class="main">
    <div id="view-setup" class="view on">
      <div class="setup-wrap">
        <div class="setup-icon">📚</div>
        <div class="setup-title">English Lab</div>
        <div class="setup-desc">90天英语词汇恢复与综合提升<br>商务 · 金融 · 数据分析 · 外贸 · 雅思<br><br>请填入 DeepSeek API Key 开始</div>
        <div class="key-input-wrap"><input class="key-input" id="keyInput" type="password" placeholder="sk-xxxxxxxxxxxxxxxx" /></div>
        <button class="btn" onclick="saveKey()">开始使用 →</button>
        <div style="margin-top:12px;font-size:11px;color:var(--text3)">Key 仅存在本地，不会上传</div>
      </div>
    </div>
    <div id="view-dash" class="view">
      <div id="pauseBanner"></div>
      <div class="dash-grid">
        <div class="dash-card"><div class="dash-label">总词汇量</div><div class="dash-val" id="dVocab">0 <span class="u">词</span></div></div>
        <div class="dash-card"><div class="dash-label">待复习</div><div class="dash-val" id="dReview">0 <span class="u">词</span></div></div>
        <div class="dash-card"><div class="dash-label">学习时间</div><div class="dash-val" id="dMins">0 <span class="u">min</span></div></div>
        <div class="dash-card"><div class="dash-label">当前阶段</div><div class="dash-val" id="dPhase" style="font-size:14px">—</div></div>
      </div>
      <div class="sec-title">今日任务清单</div>
      <div id="todayChecklist"></div>
    </div>
    <div id="view-vocab" class="view">
      <div class="filter-row">
        <button class="fchip on" onclick="setVmode('list')">词汇本</button>
        <button class="fchip" onclick="setVmode('flash')">闪卡</button>
        <button class="fchip" onclick="setVmode('daily')">今日新词</button>
        <button class="fchip" onclick="setVmode('add')">手动添加</button>
      </div>
      <div id="vlist"></div>
      <div id="vflash" style="display:none"></div>
      <div id="vdaily" style="display:none"></div>
      <div id="vadd" style="display:none">
        <div class="card">
          <div style="margin-bottom:10px;font-size:13px;color:var(--text2)">输入单词，AI 自动补全释义和例句</div>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input class="input" id="addWordInput" placeholder="输入英文单词..." style="flex:1"/>
            <button class="btn" onclick="addWordManual()">添加</button>
          </div>
          <div id="addWordMsg"></div>
        </div>
      </div>
    </div>
    <div id="view-dialogue" class="view"><div id="dlgList"></div><div id="dlgDetail" style="display:none"></div></div>
    <div id="view-read" class="view"><div id="readList"></div><div id="readArticle" style="display:none"></div></div>
    <div id="view-progress" class="view"><div id="progressContent"></div></div>
    <div id="view-test" class="view"><div id="testContent"></div></div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="popup" id="popup">
  <button class="popup-close" onclick="closePopup()">✕</button>
  <div class="popup-word" id="popupWord"></div>
  <div class="popup-ph" id="popupPh"></div>
  <div class="popup-def" id="popupDef"></div>
  <button class="btn btn-sm" style="margin-top:14px" id="popupAddBtn" onclick="addFromPopup()">+ 加入词汇本</button>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const DS_BASE='https://api.deepseek.com/v1/chat/completions';
const TOTAL_DAYS=90;

// Pause dates: complete pause (no tasks at all)
const PAUSE_DATES=['2026-07-16','2026-07-17','2026-07-18','2026-07-19','2026-07-20','2026-07-30','2026-07-31','2026-08-01'];
// Light mode dates: only vocab tasks
const LIGHT_DATES=[];
for(let d=21;d<=29;d++) LIGHT_DATES.push(`2026-07-${d<10?'0'+d:d}`);

const USER_CONTEXT=`You are helping a Chinese professional who is rebuilding their English proficiency to B2+ / IELTS 6.5+ level across multiple domains. Their background includes business, finance, data analytics, and international trade. They need vocabulary and skills for:
- Daily/general English: common expressions, idioms, phrasal verbs
- Business English: meetings, presentations, negotiations, emails, reports
- Finance & Economics: investment, accounting, financial markets, economic indicators, banking
- Data & Analytics: data analysis terms, statistics, visualization, reporting, SQL/Python context
- International Trade: import/export, logistics, supply chain, trade terms (FOB, CIF, L/C, B/L)
- IELTS preparation: academic vocabulary, essay structures, speaking test phrases, reading strategies
The goal is rapid vocabulary recovery and comprehensive skill building over 90 days. The learner has a B1-B2 foundation but needs to activate dormant vocabulary and expand into professional domains.`;

const VOCAB_CATS={
  daily:{label:'日常表达',chip:'chip-pur',color:'var(--purple)'},
  biz:{label:'商务英语',chip:'chip-blu',color:'var(--blue)'},
  finance:{label:'金融经济',chip:'chip-grn',color:'var(--green)'},
  data:{label:'数据分析',chip:'chip-acc',color:'var(--accent)'},
  trade:{label:'外贸物流',chip:'chip-amb',color:'var(--amber)'},
  ielts:{label:'雅思词汇',chip:'chip-red',color:'var(--red)'},
};

// ══════════════════════════════════════════
// 90-DAY PLAN
// ══════════════════════════════════════════
const PHASES=[
  {name:'第一阶段',title:'词汇激活 + 听力重启',days:[1,18],color:'var(--blue)'},
  {name:'第二阶段',title:'商务金融专项 + 口语框架',days:[19,36],color:'var(--green)'},
  {name:'第三阶段',title:'数据/外贸专项 + 写作基础',days:[37,54],color:'var(--amber)'},
  {name:'出差期',title:'出差调整期',days:[55,72],color:'var(--red)'},
  {name:'第四阶段',title:'雅思冲刺 + 综合强化',days:[73,90],color:'var(--accent)'},
];

function getPhase(dayNum){return PHASES.find(p=>dayNum>=p.days[0]&&dayNum<=p.days[1])||PHASES[0];}

function isDayPaused(dayNum){const ds=getDateForDay(dayNum);return PAUSE_DATES.includes(ds);}
function isDayLight(dayNum){const ds=getDateForDay(dayNum);return LIGHT_DATES.includes(ds);}

function getDayPlan(dayNum){
  const dateStr=getDateForDay(dayNum);
  // Complete pause
  if(PAUSE_DATES.includes(dateStr)) return [{id:'pause',label:'🛫 出差中 · 今日休息',hint:'好好工作，明天继续',tag:'ext',auto:false,mins:0}];
  // Light mode
  if(LIGHT_DATES.includes(dateStr)){
    return [
      {id:'daily_vocab',label:'今日新词 (20词)',hint:'在词汇模块完成 · 出差轻量模式',tag:'tool',auto:true,mins:10},
      {id:'flashcard',label:'闪卡复习',hint:'在词汇模块完成',tag:'tool',auto:true,mins:10},
    ];
  }

  const tasks=[];
  tasks.push({id:'daily_vocab',label:'今日新词 (20词)',hint:'在词汇模块完成',tag:'tool',auto:true,mins:10});
  tasks.push({id:'flashcard',label:'闪卡复习',hint:'在词汇模块完成',tag:'tool',auto:true,mins:10});
  tasks.push({id:'dialogue',label:'情景对话练习',hint:'在情景模块完成',tag:'tool',auto:true,mins:10});
  tasks.push({id:'reading',label:'阅读理解 + 答题',hint:'在阅读模块完成',tag:'tool',auto:true,mins:10});

  // Phase 1: Days 1-18 — Vocabulary activation + listening restart
  if(dayNum<=18){
    tasks.push({id:'listen1',label:'BBC 6 Minute English × 1集',hint:'播客App搜索 "6 Minute English"，听 business/technology/society 话题',tag:'listen',auto:false,mins:10});
    tasks.push({id:'listen2',label:'All Ears English × 1集',hint:'播客App搜索 "All Ears English"，听日常对话和美式表达',tag:'listen',auto:false,mins:10});
    if(dayNum<=6) tasks.push({id:'speak1',label:'每日跟读练习',hint:'跟读今天听的播客片段2-3分钟，模仿语调和节奏',tag:'speak',auto:false,mins:5});
    else if(dayNum<=12) tasks.push({id:'speak1',label:'话题自由表达 (1min)',hint:['描述你的工作经历','谈谈你最近读的一本书','介绍你喜欢的一部电影','说一个你擅长的技能','描述你理想的工作环境','分享一个旅行经历'][(dayNum-7)%6],tag:'speak',auto:false,mins:5});
    else tasks.push({id:'speak1',label:'话题自由表达 (2min)',hint:['对比两种工作方式','分析一个行业趋势','描述解决问题的过程','讨论数据驱动决策的重要性','总结一篇你读过的文章','模拟向老板汇报工作'][(dayNum-13)%6],tag:'speak',auto:false,mins:8});
    if(dayNum%6===0) tasks.push({id:'ext_quiz',label:'Quizlet 词汇复习',hint:'quizlet.com 搜索 "IELTS vocabulary B2" 或 "Business English advanced"',tag:'ext',auto:false,mins:10});
  }
  // Phase 2: Days 19-36 — Business + Finance focus + speaking frameworks
  else if(dayNum<=36){
    tasks.push({id:'listen1',label:'Business English Pod × 1集',hint:'播客App搜索 "Business English Pod"，听 Meetings/Presentations/Negotiations',tag:'listen',auto:false,mins:15});
    const speakFrameworks=['会议开场与议程设置','数据汇报与图表描述','提出建议与推荐方案','回应反对意见','总结会议与分配任务','电话沟通与留言','商务邮件口头版','客户需求确认','项目进度汇报','谈判让步与底线'];
    const fi=(dayNum-19)%10;
    const fwHints=[
      '"Let me start by outlining today\'s agenda..."',
      '"As you can see from the chart, revenue increased by..."',
      '"Based on the data, I\'d recommend we..."',
      '"I understand your concern, however..."',
      '"To summarize the key action items..."',
      '"I\'m calling to follow up on..."',
      '"I\'m writing to confirm the details we discussed..."',
      '"Could you walk me through your requirements?"',
      '"We\'re currently on track to deliver by..."',
      '"While I appreciate your position, our bottom line is..."',
    ];
    tasks.push({id:'framework',label:`口语框架: ${speakFrameworks[fi]}`,hint:`练习: ${fwHints[fi]}`,tag:'speak',auto:false,mins:10});
    if(dayNum%4===0) tasks.push({id:'ext_read',label:'FT/Bloomberg 财经阅读',hint:'ft.com 或 Bloomberg 读一篇财经短文，记5个生词',tag:'read',auto:false,mins:15});
  }
  // Phase 3: Days 37-54 — Data/Trade focus + writing
  else if(dayNum<=54){
    tasks.push({id:'listen1',label:'专题播客',hint:dayNum%2===0?'播客搜索 "Data Skeptic" 或 "Not So Standard Deviations"，听数据分析话题':'播客搜索 "Trade Talks" 或 "Freakonomics Radio"，听经济/贸易话题',tag:'listen',auto:false,mins:15});
    const writeTopics=['写一封询盘邮件','写一份会议纪要','写数据分析报告摘要','写一封催款邮件','写产品推荐邮件','写一封道歉/解释邮件','写一份项目提案摘要','写一封跟进邮件','写贸易条款确认邮件','改写一段话使其更正式'];
    const wi=(dayNum-37)%10;
    tasks.push({id:'writing',label:`写作练习: ${writeTopics[wi]}`,hint:'用英文写150-200词，注意商务/学术语域',tag:'ext',auto:false,mins:15});
    if(dayNum%3===0) tasks.push({id:'speak1',label:'即兴表达 (2min)',hint:'随机选一个话题，计时2分钟不间断说英文',tag:'speak',auto:false,mins:5});
  }
  // Phase 4 (travel period): handled by PAUSE_DATES and LIGHT_DATES above
  // Phase 5: Days 73-90 — IELTS sprint + comprehensive
  else if(dayNum>=73){
    tasks.push({id:'listen1',label:'IELTS Listening 练习',hint:'YouTube搜索 "IELTS listening practice test"，做一个 Section，对答案',tag:'listen',auto:false,mins:20});
    const ieltsSpeak=['Part 1: 日常话题快问快答','Part 2: 2分钟独白 · 描述一个地方','Part 2: 2分钟独白 · 描述一个人','Part 2: 2分钟独白 · 描述一次经历','Part 3: 深度讨论 · 教育话题','Part 3: 深度讨论 · 科技话题','Part 3: 深度讨论 · 环境话题','模拟完整口语考试 Part 1-3'];
    const si=(dayNum-73)%8;
    tasks.push({id:'speak1',label:`雅思口语: ${ieltsSpeak[si]}`,hint:'录音练习，注意流利度和连接词使用',tag:'speak',auto:false,mins:10});
    if(dayNum%2===0) tasks.push({id:'writing',label:'雅思写作练习',hint:dayNum%4===0?'Task 1: 描述图表/流程图，150词':'Task 2: 议论文，250词。注意结构: intro→body1→body2→conclusion',tag:'ext',auto:false,mins:25});
    if(dayNum%5===0) tasks.push({id:'ext_read',label:'雅思阅读真题',hint:'搜索 "IELTS Reading practice Cambridge"，限时20分钟做一篇',tag:'read',auto:false,mins:20});
  }
  return tasks;
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S={
  key:'',level:'B1-B2',streak:0,lastActive:null,totalTokens:0,
  vocab:[],dialogueCount:0,
  dailyVocab:null,dailyReading:null,
  testHistory:[],startDate:null,
  checklist:{},dayHistory:{},
  sessionStart:null,todayMins:0,lastTimeUpdate:null,
};

function load(){try{const d=localStorage.getItem('selina_eng_v2');if(d)Object.assign(S,JSON.parse(d));}catch(e){}}
function save(){try{localStorage.setItem('selina_eng_v2',JSON.stringify(S));}catch(e){}}

// ══════════════════════════════════════════
// API
// ══════════════════════════════════════════
async function ds(systemPrompt,userPrompt,maxTokens=800){
  const resp=await fetch(DS_BASE,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${S.key}`},
    body:JSON.stringify({model:'deepseek-chat',max_tokens:maxTokens,temperature:0.3,messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}]})});
  if(!resp.ok){const err=await resp.json().catch(()=>({}));throw new Error(err.error?.message||`HTTP ${resp.status}`);}
  const data=await resp.json();
  if(data.usage){S.totalTokens+=(data.usage.total_tokens||0);save();document.getElementById('tokenCount').textContent=Math.round(S.totalTokens/1000);}
  return data.choices[0].message.content;
}
async function dsJSON(system,user,maxTokens=800){const raw=await ds(system,user,maxTokens);return JSON.parse(raw.replace(/```json|```/g,'').trim());}

// ══════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════
function saveKey(){
  const k=document.getElementById('keyInput').value.trim();
  if(!k.startsWith('sk-')){alert('请输入有效的 DeepSeek API Key');return;}
  S.key=k;if(!S.startDate)S.startDate=todayStr();
  save();showMainApp();
}
function showMainApp(){document.getElementById('view-setup').classList.remove('on');updateStreak();renderAll();gotoTab('dash');}

// ══════════════════════════════════════════
// TIME TRACKING
// ══════════════════════════════════════════
let _timeInterval=null;
function startTimeTracking(){
  if(_timeInterval)return;S.sessionStart=Date.now();
  _timeInterval=setInterval(()=>{if(document.hidden)return;S.todayMins=Math.round((Date.now()-S.sessionStart)/60000);},30000);
}
function getTodayMins(){if(!S.sessionStart)return S.todayMins||0;return Math.max(S.todayMins||0,Math.round((Date.now()-S.sessionStart)/60000));}
function getTotalMins(){let t=0;Object.values(S.dayHistory).forEach(d=>{t+=(d.mins||0);});return t+getTodayMins();}
document.addEventListener('visibilitychange',()=>{if(document.hidden){const td=todayStr();if(!S.dayHistory[td])S.dayHistory[td]={completed:0,total:0,mins:0};S.dayHistory[td].mins=getTodayMins();save();}});
window.addEventListener('beforeunload',()=>{const td=todayStr();if(!S.dayHistory[td])S.dayHistory[td]={completed:0,total:0,mins:0};S.dayHistory[td].mins=getTodayMins();save();});

// ══════════════════════════════════════════
// STREAK & UTILS
// ══════════════════════════════════════════
function updateStreak(){
  const t=todayStr();if(S.lastActive===t)return;
  const y=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(S.lastActive===y)S.streak++;else if(S.lastActive!==t)S.streak=1;
  S.lastActive=t;save();
}
function markActive(){const t=todayStr();if(S.lastActive!==t){S.lastActive=t;S.streak=Math.max(S.streak,1);save();}}
const todayStr=()=>new Date().toISOString().slice(0,10);
const todayDate=()=>new Date().toDateString();
const isTodayData=(d)=>d&&d.date===todayDate();

function getDayNum(){
  if(!S.startDate)return 1;
  const start=new Date(S.startDate);const now=new Date(todayStr());
  return Math.min(Math.max(Math.floor((now-start)/(1000*60*60*24))+1,1),TOTAL_DAYS);
}
function getDateForDay(dayNum){
  if(!S.startDate)return '';
  const d=new Date(S.startDate);d.setDate(d.getDate()+dayNum-1);return d.toISOString().slice(0,10);
}
function speak(word){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.85;window.speechSynthesis.speak(u);}

// ══════════════════════════════════════════
// CHECKLIST
// ══════════════════════════════════════════
function getTodayChecklist(){const td=todayStr();if(!S.checklist[td])S.checklist[td]={};return S.checklist[td];}
function isAutoTaskDone(taskId){
  if(taskId==='daily_vocab')return isTodayData(S.dailyVocab);
  if(taskId==='flashcard'){try{const d=localStorage.getItem(`eng_fc_${todayDate()}`);return d&&Object.keys(JSON.parse(d)).length>0;}catch(e){return false;}}
  if(taskId==='dialogue')return !!getTodayChecklist()['dialogue'];
  if(taskId==='reading')return isTodayData(S.dailyReading)&&hasAnsweredReadingToday();
  return false;
}
function hasAnsweredReadingToday(){try{const s=localStorage.getItem('eng_qanswers');const p=s?JSON.parse(s):{};return p.date===todayDate()&&p.submitted;}catch(e){return false;}}
function toggleChecklistItem(taskId){const cl=getTodayChecklist();cl[taskId]=!cl[taskId];save();updateDayHistory();renderDash();}
function updateDayHistory(){
  const td=todayStr();const dayNum=getDayNum();const tasks=getDayPlan(dayNum);const cl=getTodayChecklist();
  let completed=0;
  tasks.forEach(t=>{if(t.auto){if(isAutoTaskDone(t.id))completed++;}else{if(cl[t.id])completed++;}});

}

function renderDash(){
  const dayNum=getDayNum();const phase=getPhase(dayNum);
  const due=S.vocab.filter(v=>!v.lastReview||Date.now()-v.lastReview>86400000).length;
  document.getElementById('dVocab').innerHTML=`${S.vocab.length} <span class="u">词</span>`;
  document.getElementById('dReview').innerHTML=`${due} <span class="u">词</span>`;
  document.getElementById('dMins').innerHTML=`${getTodayMins()} <span class="u">min</span>`;
  document.getElementById('dPhase').textContent=phase.name;

  // Pause banner
  const paused=isDayPaused(dayNum);const light=isDayLight(dayNum);
  document.getElementById('pauseBanner').innerHTML=paused?
    `<div class="pause-banner">🛫 <div>出差中 · 今天完全休息<br><span style="font-size:11px;color:var(--text3)">Day ${dayNum}/${TOTAL_DAYS} · 休息不扣streak</span></div></div>`:
    (light?`<div class="pause-banner" style="background:var(--amber2);border-color:var(--amber)">✈️ <div>出差轻量模式 · 只保留词汇任务<br><span style="font-size:11px;color:var(--text3)">Day ${dayNum}/${TOTAL_DAYS} · ${phase.title}</span></div></div>`:'');

  const tasks=getDayPlan(dayNum);const cl=getTodayChecklist();
  let doneCount=0;
  const tagMap={tool:'cl-tag-tool',listen:'cl-tag-listen',speak:'cl-tag-speak',ext:'cl-tag-ext',read:'cl-tag-read'};
  const tagLabel={tool:'工具',listen:'听力',speak:'口语',ext:'拓展',read:'阅读'};
  const html=tasks.map((t,i)=>{
    const isDone=t.auto?isAutoTaskDone(t.id):!!cl[t.id];
    if(isDone)doneCount++;
    const checkClass=t.auto?(isDone?'cl-check auto done':'cl-check auto'):(isDone?'cl-check done':'cl-check');
    const onclick=t.auto?(t.id==='daily_vocab'?`gotoTabWithMode('vocab','daily')`:(t.id==='flashcard'?`gotoTabWithMode('vocab','flash')`:(t.id==='dialogue'?`gotoTab('dialogue')`:`gotoTab('read')`))):
      `toggleChecklistItem('${t.id}')`;
    return `<div class="cl-item fade-up" style="animation-delay:${i*.03}s">
      <button class="${checkClass}" onclick="${onclick}">${isDone?'✓':''}</button>
      <div class="cl-body" ${t.auto?`onclick="${onclick}" style="cursor:pointer"`:''}>
        <div class="cl-label ${isDone?'done':''}">${t.label}</div>
        <div class="cl-hint"><span class="cl-tag ${tagMap[t.tag]||'cl-tag-ext'}">${tagLabel[t.tag]||'拓展'}</span> ${t.hint}</div>
        ${t.mins?`<div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:2px">⏱ 约${t.mins}分钟</div>`:''}
      </div></div>`;
  }).join('');
  const pct=tasks.length?Math.round(doneCount/tasks.length*100):0;
  document.getElementById('todayChecklist').innerHTML=`
    <div class="cl-summary"><div class="cl-pct">${pct}%</div>
      <div style="flex:1"><div style="font-size:12px;color:var(--text2)">今日完成 ${doneCount}/${tasks.length} 项</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'var(--green)':'var(--accent)'}"></div></div>
      </div>${pct===100?'<span style="font-size:18px">🎉</span>':''}</div>${html}`;
}

async function renderDailyVocab(){
  const el=document.getElementById('vdaily');
  if(isTodayData(S.dailyVocab)){el.innerHTML=renderDailyVocabHTML(S.dailyVocab.words);return;}
  el.innerHTML=`<div class="art-generating"><span class="spinner spinner-dark"></span><br><br>AI 正在生成今日20个新词...</div>`;
  try{
    const existing=S.vocab.slice(0,40).map(v=>v.word).join(', ');
    const dayNum=getDayNum();const phase=getPhase(dayNum);
    // Adjust vocab mix based on phase
    let catInstruction='';
    if(dayNum<=18) catInstruction='Mix: 4 "daily" (common expressions/phrasal verbs), 4 "biz" (business), 4 "finance" (finance/economics), 4 "ielts" (academic/IELTS), 4 "trade" (international trade)';
    else if(dayNum<=36) catInstruction='Focus on business & finance: 6 "biz", 6 "finance", 3 "daily", 3 "ielts", 2 "data"';
    else if(dayNum<=54) catInstruction='Focus on data & trade: 5 "data", 5 "trade", 4 "biz", 3 "finance", 3 "ielts"';
    else if(dayNum<=72) catInstruction='Mix for review: 4 "daily", 4 "biz", 4 "finance", 4 "data", 4 "trade"';
    else catInstruction='IELTS focus: 6 "ielts", 4 "biz", 4 "finance", 3 "data", 3 "daily"';
    const words=await dsJSON(
      USER_CONTEXT+'\nYou are a vocabulary teacher generating words across multiple professional domains.',
      `Generate exactly 20 English vocabulary words for today. Level: B1-B2 transitioning to C1.
${catInstruction}
Categories: "daily" | "biz" | "finance" | "data" | "trade" | "ielts"
${existing?`Avoid: ${existing}`:''}
Return ONLY JSON array: [{"word":"...","phonetic":"/…/","defs":[{"pos":"n.","def":"中文释义"}],"def":"主要释义","cat":"daily|biz|finance|data|trade|ielts","example":"Example sentence.","exZh":"例句翻译"}]`,2500);
    S.dailyVocab={date:todayDate(),words};markActive();save();updateDayHistory();renderDash();
    el.innerHTML=renderDailyVocabHTML(words);
  }catch(e){el.innerHTML=`<div class="empty">生成失败: ${e.message}<br><button class="btn btn-sm" style="margin-top:10px" onclick="renderDailyVocab()">重试</button></div>`;}
}

    <div style="font-size:12px;color:var(--text3)">今日 ${words.length} 个新词</div>

    <div class="vcard-word">${w.word}</div><span class="chip ${VOCAB_CATS[w.cat]?.chip||'chip-acc'}">${VOCAB_CATS[w.cat]?.label||w.cat}</span>

    ${renderDefsHTML(w)} ${w.example?`<div class="vcard-ex">${w.example}${w.exZh?`<span class="vcard-exzh">${w.exZh}</span>`:''}</div>`:''}</div></div>`).join('')}`;

function toggleDailyCard(i){document.getElementById('dvc'+i)?.classList.toggle('on');}
function addAllDailyWords(){if(!S.dailyVocab?.words)return;let a=0;S.dailyVocab.words.forEach(w=>{if(!S.vocab.find(v=>v.word.toLowerCase()===w.word.toLowerCase())){S.vocab.unshift({...w,starred:false,added:Date.now(),reviewCount:0,lastReview:null});a++;}});markActive();save();renderAll();alert(`已添加 ${a} 个新词`);}
function addOneDailyWord(i){const w=S.dailyVocab?.words[i];if(!w||S.vocab.find(v=>v.word.toLowerCase()===w.word.toLowerCase()))return;S.vocab.unshift({...w,starred:false,added:Date.now(),reviewCount:0,lastReview:null});markActive();save();renderHeader();}
async function addWordManual(){
  const input=document.getElementById('addWordInput');const word=input.value.trim();const msg=document.getElementById('addWordMsg');
  if(!word)return;if(S.vocab.find(v=>v.word.toLowerCase()===word.toLowerCase())){msg.innerHTML='<div style="color:var(--amber);font-size:12px;padding:6px 0">已在词汇本中</div>';return;}

    S.vocab.unshift({...w,starred:false,added:Date.now(),reviewCount:0,lastReview:null});

  }catch(e){msg.innerHTML=`<div style="color:var(--red);font-size:12px;padding:6px 0">失败: ${e.message}</div>`;}

document.getElementById('addWordInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')addWordManual();});

let fcRatings={};const FC_KEY=()=>`eng_fc_${todayDate()}`;
function loadFcRatings(){try{const d=localStorage.getItem(FC_KEY());return d?JSON.parse(d):{};}catch(e){return {};}}
function saveFcRatings(){try{localStorage.setItem(FC_KEY(),JSON.stringify(fcRatings));}catch(e){}}
function initFlash(clear){if(clear){fcRatings={};saveFcRatings();}else fcRatings=loadFcRatings();const allQ=S.vocab.filter(v=>!v.lastReview||Date.now()-v.lastReview>86400000);const pool=allQ.length?allQ:[...S.vocab];flashQueue=pool.filter(v=>!fcRatings[v.word]);flashIdx=0;flashRevealed=false;renderFlash();}
function showRatedWords(r){const map={hard:'❌ 不会',ok:'🤔 模糊',easy:'✅ 记住了'};const col={hard:'var(--red)',ok:'var(--amber)',easy:'var(--green)'};const entries=Object.entries(fcRatings).filter(([w,rt])=>rt===r);if(!entries.length)return;const html=entries.map(([w])=>{const v=S.vocab.find(x=>x.word===w);const d=v?.defs?.[0]?.def||v?.def||'';return `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:8px"><span style="font-family:var(--serif);font-size:15px;font-weight:500;flex:1">${w}</span><span style="font-size:11px;color:var(--text3)">${d}</span></div>`;}).join('');document.getElementById('overlay').classList.add('on');const p=document.getElementById('popup');p.classList.add('on');document.getElementById('popupWord').innerHTML=`<span style="color:${col[r]}">${map[r]}</span>`;document.getElementById('popupPh').textContent=`今日标记了 ${entries.length} 个单词`;document.getElementById('popupDef').innerHTML=`<div style="max-height:300px;overflow-y:auto">${html}</div>`;document.getElementById('popupAddBtn').style.display='none';}
function fcDefsHTML(v){if(v.defs&&v.defs.length)return v.defs.map((d,i)=>`<div class="fc-def-big" style="${i>0?'font-size:14px;font-weight:500;margin-bottom:8px;':''}"><span style="font-size:11px;background:var(--accent2);color:var(--accent);padding:1px 6px;border-radius:3px;margin-right:5px;font-family:var(--mono)">${d.pos}</span>${d.def}</div>`).join('');return `<div class="fc-def-big">${v.def||''}</div>`;}
function renderFlash(){
  const el=document.getElementById('vflash');
  if(!S.vocab.length){el.innerHTML='<div class="empty">还没有词汇<br>先去「今日新词」学一批 📚</div>';return;}
  const hard=Object.values(fcRatings).filter(r=>r==='hard').length;const ok=Object.values(fcRatings).filter(r=>r==='ok').length;const easy=Object.values(fcRatings).filter(r=>r==='easy').length;const tot=hard+ok+easy;
  if(flashIdx>=flashQueue.length){updateDayHistory();renderDash();el.innerHTML=`<div class="fc-wrap"><div style="width:100%;max-width:360px;text-align:center;padding:30px 0"><div style="font-size:36px;margin-bottom:12px">${flashQueue.length>0?'🎉':'✅'}</div><div style="font-family:var(--serif);font-size:20px;font-weight:600;margin-bottom:6px">${flashQueue.length>0?'本轮完成！':'今日已全部复习！'}</div><div style="font-size:13px;color:var(--text3);margin-bottom:6px">今日累计评分 ${tot} 个单词</div><div class="fc-stats-bar"><div class="fc-stat hard" onclick="showRatedWords('hard')" style="cursor:${hard?'pointer':'default'}"><span class="n">${hard}</span>不会</div><div class="fc-stat ok" onclick="showRatedWords('ok')" style="cursor:${ok?'pointer':'default'}"><span class="n">${ok}</span>模糊</div><div class="fc-stat easy" onclick="showRatedWords('easy')" style="cursor:${easy?'pointer':'default'}"><span class="n">${easy}</span>记住了</div></div>${hard>0?`<button class="btn" style="width:100%;margin-top:14px" onclick="retryHard()">再练一遍「不会」的 (${hard}词)</button>`:''}<button class="btn" style="width:100%;margin-top:10px;background:var(--bg3);color:var(--text2)" onclick="initFlash(true)">清除记录重新开始</button></div></div>`;return;}
  const v=flashQueue[flashIdx];const pct=Math.round(flashIdx/flashQueue.length*100);
  el.innerHTML=`<div class="fc-wrap"><div class="fc-stats-bar"><div class="fc-stat hard"><span class="n">${hard}</span>不会</div><div class="fc-stat ok"><span class="n">${ok}</span>模糊</div><div class="fc-stat easy"><span class="n">${easy}</span>记住了</div><div class="fc-stat left"><span class="n">${flashQueue.length-flashIdx}</span>剩余</div></div><div class="fc-prog-wrap"><div class="fc-prog-bar"><div class="fc-prog-fill" style="width:${pct}%"></div></div><div class="fc-prog-label">${flashIdx}/${flashQueue.length}</div></div><div class="fc" onclick="revealFlash()"><div class="fc-front"><span class="chip ${VOCAB_CATS[v.cat]?.chip||'chip-acc'} fc-cat-tag">${VOCAB_CATS[v.cat]?.label||v.cat}</span><div class="fc-word">${v.word}</div><div class="fc-ph-row">${v.phonetic?`<span class="fc-ph">${v.phonetic}</span>`:''}<button class="fc-speak" onclick="event.stopPropagation();speak('${v.word}')">🔊 朗读</button></div>${!flashRevealed?`<div class="fc-hint">点击卡片查看释义</div>`:''}</div>${flashRevealed?`<div class="fc-back"><div class="fc-pos">${VOCAB_CATS[v.cat]?.label||v.cat}</div>${fcDefsHTML(v)}${v.example?`<div class="fc-ex-wrap"><div class="fc-ex-en">${v.example}</div>${v.exZh?`<div class="fc-ex-zh">${v.exZh}</div>`:''}</div>`:''}</div>`:''}</div>${flashRevealed?`<div class="fc-actions"><button class="fc-btn hard" onclick="rateFlash('hard')"><span class="fc-btn-icon">😣</span>不会</button><button class="fc-btn ok" onclick="rateFlash('ok')"><span class="fc-btn-icon">🤔</span>模糊</button><button class="fc-btn easy" onclick="rateFlash('easy')"><span class="fc-btn-icon">😊</span>记住了</button></div>`:''}</div>`;
}
function revealFlash(){flashRevealed=true;renderFlash();speak(flashQueue[flashIdx]?.word||'');}
function rateFlash(r){const v=flashQueue[flashIdx];fcRatings[v.word]=r;saveFcRatings();const orig=S.vocab.find(w=>w.word===v.word);if(orig){orig.lastReview=Date.now();orig.reviewCount=(orig.reviewCount||0)+1;orig.lastRating=r;if(r==='easy')orig.mastered=true;else if(r==='hard')orig.mastered=false;}save();flashIdx++;flashRevealed=false;renderFlash();}
function retryHard(){const hw=Object.entries(fcRatings).filter(([w,r])=>r==='hard').map(([w])=>w);hw.forEach(w=>delete fcRatings[w]);saveFcRatings();flashQueue=S.vocab.filter(v=>hw.includes(v.word));flashIdx=0;flashRevealed=false;renderFlash();}

async function generateDialogue(sceneId){
  const scene=DLG_SCENES.find(s=>s.id===sceneId);if(!scene)return;
  const el=document.getElementById('dlgList');const detail=document.getElementById('dlgDetail');
  el.style.display='none';detail.style.display='block';

  try{
    const dlg=await dsJSON(USER_CONTEXT+'\nGenerate realistic bilingual dialogue scenarios.',
      `Generate a dialogue for: "${scene.title}" (${scene.desc}). Level: B2. 8-12 exchanges. Include realistic professional context.
Return ONLY JSON: {"title":"${scene.title}","scene":"场景描述","icon":"${scene.icon}",
"exchanges":[{"role":"other","en":"...","zh":"..."},{"role":"you","en":"...","zh":"..."}],
"keyPhrases":[{"en":"phrase","zh":"释义","note":"使用场景"}],
"newWords":[{"word":"...","phonetic":"/…/","def":"中文释义","cat":"daily|biz|finance|data|trade|ielts"}]}`,2000);
    markDialogueDone();renderHeader();renderDialogueDetail(dlg);
  }catch(e){detail.innerHTML=`<div class="empty">生成失败: ${e.message}<br><button class="btn btn-sm" style="margin-top:10px" onclick="backToDlgList()">返回</button></div>`;}
}
function renderDialogueDetail(dlg){
  document.getElementById('dlgDetail').innerHTML=`
    <button class="reader-back" onclick="backToDlgList()">← 返回</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="font-size:28px">${dlg.icon||'🗣️'}</span>
    <div><div class="reader-title" style="margin-bottom:0">${dlg.title}</div><div style="font-size:12px;color:var(--text3)">${dlg.scene||''}</div></div></div>
    <button class="dlg-toggle" id="zhToggle" onclick="toggleDlgZh()">显示中文翻译</button>
    <div class="dlg-flow">${(dlg.exchanges||[]).map(ex=>`<div class="dlg-bubble ${ex.role==='other'?'client':'you'}"><div class="dlg-role">${ex.role==='other'?'👤 Other':'🧑‍💼 You'}</div><div class="dlg-en">${ex.en}</div><div class="dlg-zh">${ex.zh}</div></div>`).join('')}</div>
    ${dlg.keyPhrases?.length?`<div class="dlg-keys"><div class="dlg-key-title">💡 关键句型</div>${dlg.keyPhrases.map(kp=>`<div class="dlg-key-item"><div class="dlg-key-en">${kp.en}</div><div class="dlg-key-zh">${kp.zh}${kp.note?`<div style="font-size:10px;color:var(--text3);margin-top:2px">${kp.note}</div>`:''}</div></div>`).join('')}</div>`:''}
    ${dlg.newWords?.length?`<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="dlg-key-title" style="margin-bottom:0">📝 本场景生词</div><button class="btn btn-sm" onclick="addDlgWords()">全部加入词汇本</button></div>${dlg.newWords.map(w=>`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);align-items:center"><span style="font-family:var(--serif);font-size:14px;font-weight:500;flex:1">${w.word}</span><span class="chip ${VOCAB_CATS[w.cat]?.chip||'chip-acc'}">${VOCAB_CATS[w.cat]?.label||w.cat}</span><span style="font-size:12px;color:var(--text3)">${w.def}</span></div>`).join('')}</div>`:''}`;
  window._currentDlgWords=dlg.newWords||[];
}
function toggleDlgZh(){const zhs=document.querySelectorAll('.dlg-zh');const btn=document.getElementById('zhToggle');const s=zhs[0]?.classList.contains('show');zhs.forEach(z=>z.classList.toggle('show',!s));btn.textContent=s?'显示中文翻译':'隐藏中文翻译';}
function addDlgWords(){if(!window._currentDlgWords?.length)return;let a=0;window._currentDlgWords.forEach(w=>{if(!S.vocab.find(v=>v.word.toLowerCase()===w.word.toLowerCase())){S.vocab.unshift({...w,defs:[{pos:'',def:w.def}],example:'',exZh:'',starred:false,added:Date.now(),reviewCount:0,lastReview:null});a++;}});markActive();save();renderHeader();alert(`已添加 ${a} 个生词`);}
function backToDlgList(){document.getElementById('dlgList').style.display='block';document.getElementById('dlgDetail').style.display='none';}

// ══════════════════════════════════════════
// READING — submit to grade
// ══════════════════════════════════════════
const READ_TYPES=['Financial Report Summary','Business Email','Meeting Minutes','Data Analysis Brief','Trade Contract Clause','Industry News Article','IELTS Reading Passage','Project Proposal','Market Research Summary','Investor Update'];
async function renderReadList(){
  const el=document.getElementById('readList');
  if(isTodayData(S.dailyReading)){el.innerHTML=renderArticleCard(S.dailyReading.article);return;}
  el.innerHTML=`<div class="art-generating"><span class="spinner spinner-dark"></span><br><br>AI 正在生成今日阅读材料...</div>`;
  try{
    const docType=READ_TYPES[Math.floor(Math.random()*READ_TYPES.length)];
    const dayNum=getDayNum();let levelHint='B2';
    if(dayNum>=73) levelHint='B2-C1, IELTS academic style';
    const article=await dsJSON(USER_CONTEXT+'\nCreate realistic English reading materials.',
      `Generate a reading practice document. Type: ${docType}. Level: ${levelHint}. 4-5 paragraphs (250-350 words).
Content from one of: business, finance, data analytics, international trade, or academic topics.
Include 5 comprehension questions with 4 options.
Return ONLY JSON: {"title":"Title","category":"${docType}","level":"${levelHint}","readTime":"5 min","paragraphs":["..."],"keywords":[{"word":"...","phonetic":"/…/","def":"中文释义"}],"questions":[{"q":"Question?","opts":["A","B","C","D"],"answer":0}]}`,1500);
    S.dailyReading={date:todayDate(),article};save();el.innerHTML=renderArticleCard(article);
  }catch(e){el.innerHTML=`<div class="empty">生成失败: ${e.message}<br><button class="btn btn-sm" style="margin-top:10px" onclick="renderReadList()">重试</button></div>`;}
}
function renderArticleCard(a){return `<div class="art-card fade-up" onclick="openArticle()"><div class="art-cat">${a.category||'Reading'}</div><div class="art-title">${a.title}</div><div class="art-desc">点击开始阅读 · 生词高亮可查释义</div><div class="art-meta"><span>📖 ${a.level||'B2'}</span><span>⏱ ${a.readTime||'5 min'}</span><span>❓ ${(a.questions||[]).length}题</span></div></div>`;}

let qSelections={},qSubmitted=false;
function openArticle(){
  const a=S.dailyReading?.article;if(!a)return;
  try{const s=localStorage.getItem('eng_qanswers');const p=s?JSON.parse(s):{};if(p.date===todayDate()){qSelections=p.selections||{};qSubmitted=!!p.submitted;}else{qSelections={};qSubmitted=false;}}catch(e){qSelections={};qSubmitted=false;}
  document.getElementById('readList').style.display='none';const el=document.getElementById('readArticle');el.style.display='block';
  const kwMap={};(a.keywords||[]).forEach(k=>{kwMap[k.word.toLowerCase()]={...k};});
  function hl(text){let o=text;Object.entries(kwMap).forEach(([w,info])=>{const re=new RegExp(`\\b(${w})\\b`,'gi');o=o.replace(re,`<span class="hl" onclick="showPopup('${info.word}','${info.phonetic||''}','${(info.def||'').replace(/'/g,"\\'")}')">$1</span>`);});return o;}
  el.innerHTML=`<button class="reader-back" onclick="closeArticle()">← 返回</button>
    <div class="art-cat">${a.category||''}</div><div class="reader-title">${a.title}</div>
    <div class="reader-meta"><span class="chip chip-acc">${a.level||'B2'}</span><span class="chip chip-blu">${a.readTime||'5 min'}</span></div>
    <div class="reader-body">${(a.paragraphs||[]).map(p=>`<p>${hl(p)}</p>`).join('')}</div>
    <div class="reader-q"><div class="reader-q-title">理解问题</div>
      ${(a.questions||[]).map((q,qi)=>`<div class="q-item" id="qi${qi}"><div class="q-text">${qi+1}. ${q.q}</div><div class="q-opts">${q.opts.map((o,oi)=>`<button class="q-opt" id="qo${qi}-${oi}" onclick="selectQ(${qi},${oi})">${o}</button>`).join('')}</div></div>`).join('')}
      <div id="qSubmitArea">${qSubmitted?'':`<button class="btn" style="width:100%;margin-top:8px" onclick="submitReading()">提交答案</button>`}</div>
      <div id="qResultArea"></div></div>`;
  if(qSubmitted) showReadingResults(a.questions);
  else Object.entries(qSelections).forEach(([qi,oi])=>{document.getElementById(`qo${qi}-${oi}`)?.classList.add('selected');});
}
function selectQ(qi,oi){if(qSubmitted)return;const prev=qSelections[qi];if(prev!==undefined)document.getElementById(`qo${qi}-${prev}`)?.classList.remove('selected');qSelections[qi]=oi;document.getElementById(`qo${qi}-${oi}`)?.classList.add('selected');try{localStorage.setItem('eng_qanswers',JSON.stringify({date:todayDate(),selections:qSelections,submitted:false}));}catch(e){}}
function submitReading(){const a=S.dailyReading?.article;if(!a)return;if(Object.keys(qSelections).length<a.questions.length){alert('请回答所有题目再提交');return;}qSubmitted=true;try{localStorage.setItem('eng_qanswers',JSON.stringify({date:todayDate(),selections:qSelections,submitted:true}));}catch(e){}markActive();save();updateDayHistory();renderDash();showReadingResults(a.questions);}
function showReadingResults(questions){let score=0;questions.forEach((q,qi)=>{const c=qSelections[qi],a=q.answer;document.getElementById(`qo${qi}-${c}`)?.classList.remove('selected');if(c===a){document.getElementById(`qo${qi}-${c}`)?.classList.add('correct');score++;}else{document.getElementById(`qo${qi}-${c}`)?.classList.add('wrong');document.getElementById(`qo${qi}-${a}`)?.classList.add('correct');}document.querySelectorAll(`#qi${qi} .q-opt`).forEach(b=>b.style.pointerEvents='none');});const sa=document.getElementById('qSubmitArea');if(sa)sa.innerHTML='';const ra=document.getElementById('qResultArea');if(ra)ra.innerHTML=`<div class="card" style="text-align:center;margin-top:14px"><div style="font-family:var(--mono);font-size:28px;font-weight:500;color:var(--accent)">${score}/${questions.length}</div><div style="font-size:13px;color:var(--text2);margin-top:4px">${score>=4?'🎉 优秀！':'💪 加油'}</div></div>`;}
function closeArticle(){document.getElementById('readList').style.display='block';document.getElementById('readArticle').style.display='none';}
function showPopup(word,ph,def){document.getElementById('overlay').classList.add('on');document.getElementById('popup').classList.add('on');document.getElementById('popupWord').textContent=word;document.getElementById('popupPh').textContent=ph;document.getElementById('popupDef').textContent=def;document.getElementById('popupAddBtn').style.display='block';document.getElementById('popupAddBtn').onclick=()=>{if(!S.vocab.find(v=>v.word.toLowerCase()===word.toLowerCase())){S.vocab.unshift({word,phonetic:ph,def,defs:[{pos:'',def}],cat:'biz',example:'',exZh:'',starred:false,added:Date.now(),reviewCount:0,lastReview:null});markActive();save();renderHeader();}closePopup();};}
function closePopup(){document.getElementById('overlay').classList.remove('on');document.getElementById('popup').classList.remove('on');}
function addFromPopup(){}

// ══════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════
function renderProgress(){
  const dayNum=getDayNum();const phase=getPhase(dayNum);const el=document.getElementById('progressContent');
  const totalMins=getTotalMins();const daysActive=Object.keys(S.dayHistory).length||(S.lastActive?1:0);
  let hm='';
  for(let d=1;d<=TOTAL_DAYS;d++){
    const ds=getDateForDay(d);const hist=S.dayHistory[ds];let cls='prog-day';
    if(PAUSE_DATES.includes(ds)){cls+=' paused';hm+=`<div class="${cls}" title="Day ${d} 休息">P</div>`;continue;}
    if(d===dayNum)cls+=' today';
    if(d>dayNum)cls+=' future';
    else if(hist){const pct=hist.total?hist.completed/hist.total:0;if(pct>=1)cls+=' full';else if(pct>0)cls+=' partial';}
    hm+=`<div class="${cls}" title="Day ${d}">${d}</div>`;
  }
  let ph=PHASES.map(p=>{const s=p.days[0],e=p.days[1],tot=e-s+1;let cd=0;
    for(let d=s;d<=e;d++){const ds=getDateForDay(d);if(PAUSE_DATES.includes(ds))continue;const h=S.dayHistory[ds];if(h&&h.total&&h.completed/h.total>=0.5)cd++;}
    const activeDays=tot-[...Array(tot)].filter((_,i)=>PAUSE_DATES.includes(getDateForDay(s+i))).length;
    const pct=activeDays?Math.round(cd/activeDays*100):0;const cur=dayNum>=s&&dayNum<=e;
    return `<div class="prog-phase" style="${cur?'border-color:'+p.color+';border-width:2px':''}"><div style="display:flex;justify-content:space-between;align-items:center"><div class="prog-phase-title">${p.name}: ${p.title}</div>${cur?`<span class="chip" style="background:${p.color}20;color:${p.color}">进行中</span>`:''}</div><div class="prog-phase-desc">Day ${s}-${e} · 已完成 ${cd}/${activeDays} 天</div><div class="prog-phase-bar"><div class="prog-phase-fill" style="width:${pct}%;background:${p.color}"></div></div><div class="prog-phase-label">${pct}%</div></div>`;
  }).join('');
  el.innerHTML=`<div class="sec-title">90天总进度</div>
    <div class="prog-stat-grid"><div class="prog-stat"><div class="prog-stat-val">${dayNum}</div><div class="prog-stat-label">当前天</div></div><div class="prog-stat"><div class="prog-stat-val">${S.vocab.length}</div><div class="prog-stat-label">总词汇</div></div><div class="prog-stat"><div class="prog-stat-val">${totalMins}</div><div class="prog-stat-label">总分钟</div></div><div class="prog-stat"><div class="prog-stat-val">${S.streak}</div><div class="prog-stat-label">连续天</div></div><div class="prog-stat"><div class="prog-stat-val">${S.dialogueCount}</div><div class="prog-stat-label">对话数</div></div><div class="prog-stat"><div class="prog-stat-val">${daysActive}</div><div class="prog-stat-label">活跃天</div></div></div>
    <div class="sec-title">每日完成情况</div>
    <div style="margin-bottom:6px;display:flex;gap:8px;font-size:10px;color:var(--text3)"><span>🟩 全部完成</span><span>🟨 部分完成</span><span>🟥 出差休息</span><span style="font-weight:600;color:var(--accent)">⊡ 今天</span></div>
    <div class="prog-heatmap">${hm}</div>
    <div class="sec-title">阶段进度</div>${ph}
    ${S.testHistory.length?`<div class="sec-title" style="margin-top:18px">测验历史</div>${S.testHistory.map(t=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--text2)">${t.date}</span><span style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--accent)">${t.score}/${t.total}</span></div>`).join('')}`:''}`;
}

// ══════════════════════════════════════════
// BIWEEKLY TEST
// ══════════════════════════════════════════
async function startBiweeklyTest(){
  gotoTab('test');const el=document.getElementById('testContent');
  el.innerHTML=`<div class="art-generating"><span class="spinner spinner-dark"></span><br><br>AI 正在生成测验...</div>`;
  const kw=S.vocab.slice(0,40).map(v=>v.word).join(', ');
  try{const test=await dsJSON(USER_CONTEXT+'\nCreate vocabulary tests.',`Generate 15 multiple-choice questions for B2 level across business, finance, data, trade, IELTS. Words studied: ${kw||'general professional vocabulary'}. Mix: definition, fill-blank, context. Return ONLY JSON: {"questions":[{"q":"Q","opts":["A","B","C","D"],"answer":0,"explain":"中文解释"}]}`,1200);renderTest(test.questions);}catch(e){el.innerHTML=`<div class="empty">失败: ${e.message}<br><button class="btn btn-sm" style="margin-top:10px" onclick="startBiweeklyTest()">重试</button></div>`;}
}
let testAnswers={},testQuestions=[];
function renderTest(questions){testQuestions=questions;testAnswers={};document.getElementById('testContent').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-family:var(--serif);font-size:18px;font-weight:600">阶段测验</div><span class="chip chip-acc">15题</span></div>${questions.map((q,qi)=>`<div class="test-q" id="tq${qi}"><div class="test-qnum">第 ${qi+1} 题</div><div class="test-qtext">${q.q}</div><div class="test-opts">${q.opts.map((o,oi)=>`<button class="test-opt" id="to${qi}-${oi}" onclick="answerTest(${qi},${oi})">${o}</button>`).join('')}</div></div>`).join('')}<button class="btn" style="width:100%;margin-top:4px" onclick="submitTest()">提交答案</button>`;}
function answerTest(qi,oi){const prev=testAnswers[qi];if(prev!==undefined)document.getElementById(`to${qi}-${prev}`)?.classList.remove('selected');testAnswers[qi]=oi;document.getElementById(`to${qi}-${oi}`).classList.add('selected');}
function submitTest(){if(Object.keys(testAnswers).length<testQuestions.length){alert('请回答所有题目');return;}let score=0;testQuestions.forEach((q,qi)=>{const a=testAnswers[qi],c=q.answer;document.getElementById(`to${qi}-${a}`).classList.remove('selected');if(a===c){document.getElementById(`to${qi}-${a}`).classList.add('correct');score++;}else{document.getElementById(`to${qi}-${a}`).classList.add('wrong');document.getElementById(`to${qi}-${c}`).classList.add('correct');}document.querySelectorAll(`#tq${qi} .test-opt`).forEach(b=>b.style.pointerEvents='none');if(q.explain){const tq=document.getElementById(`tq${qi}`);const d=document.createElement('div');d.style.cssText='margin-top:8px;font-size:11px;color:var(--text3);padding:6px 10px;background:var(--bg3);border-radius:6px';d.textContent=q.explain;tq.appendChild(d);}});S.testHistory.push({date:new Date().toLocaleDateString('zh-CN'),score,total:testQuestions.length});save();const el=document.getElementById('testContent');const rd=document.createElement('div');rd.style.cssText='position:sticky;bottom:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;text-align:center;box-shadow:var(--shadow2)';rd.innerHTML=`<div style="font-family:var(--mono);font-size:28px;font-weight:500;color:var(--accent)">${score}/${testQuestions.length}</div><div style="font-size:13px;color:var(--text2);margin-top:4px">${score>=12?'🎉 优秀！':score>=9?'👍 良好':'💪 加油'}</div><button class="btn" style="margin-top:12px;width:100%" onclick="gotoTab('dash')">返回首页</button>`;el.insertBefore(rd,el.firstChild);el.scrollTop=0;}

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
function gotoTab(tab){
  const tabs=['dash','vocab','dialogue','read','progress','test'];
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('on',tabs[i]===tab));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('on',v.id==='view-'+tab));
  if(tab==='dialogue')renderDlgList();
  if(tab==='read'){document.getElementById('readArticle').style.display='none';document.getElementById('readList').style.display='block';if(!isTodayData(S.dailyReading))renderReadList();else document.getElementById('readList').innerHTML=renderArticleCard(S.dailyReading.article);}
  if(tab==='progress')renderProgress();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
load();
if(S.key){
  document.getElementById('view-setup').classList.remove('on');updateStreak();startTimeTracking();renderAll();gotoTab('dash');
  const dayNum=getDayNum();
  if(dayNum>1&&dayNum%14===0){const tb=document.createElement('button');tb.className='nav-btn';tb.textContent='📝测验';tb.onclick=()=>startBiweeklyTest();document.querySelector('.nav').appendChild(tb);}
}else document.getElementById('view-setup').classList.add('on');
</script>
